<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人健康管理 - 草本数智</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', '思源宋体', serif;
            background-color: #f7f5f0;
            color: #2c2c2c;
            line-height: 1.8;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #f8f6f1 0%, #f0ebe3 100%);
            border-bottom: 2px solid #8b7355;
            box-shadow: 0 2px 10px rgba(139, 115, 85, 0.1);
            transition: all 0.3s ease;
            animation: navSlideDown 1s ease-out;
        }

        .nav-wrapper.scrolled {
            height: 60px;
        }

        @keyframes navSlideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 120px;
            transition: height 0.3s ease;
        }

        .nav-wrapper.scrolled .nav-container {
            height: 60px;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            color: #8b7355;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-logo svg {
            width: 40px;
            height: 40px;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-menu li a {
            text-decoration: none;
            color: #5a4a3a;
            font-size: 18px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu li a:hover,
        .nav-menu li a.active {
            color: #8b7355;
            background-color: rgba(139, 115, 85, 0.1);
        }

        .nav-menu li a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 2px;
            background-color: #8b7355;
        }

        .main-content {
            margin-top: 140px;
            padding-bottom: 60px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 0;
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border-bottom: 2px solid #c9b896;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 15px;
        }

        .page-subtitle {
            font-size: 18px;
            color: #6b5d4f;
        }

        .section {
            margin-bottom: 60px;
            padding: 40px;
            background-color: #fff;
            border: 2px solid #c9b896;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.08);
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 25px;
            text-align: center;
        }

        .health-dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .health-card {
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border: 1px solid #d4c4a8;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .health-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(139, 115, 85, 0.15);
        }

        .health-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 15px;
        }

        .health-label {
            font-size: 16px;
            color: #6b5d4f;
            margin-bottom: 10px;
        }

        .health-value {
            font-size: 28px;
            font-weight: 700;
            color: #8b7355;
        }

        .health-unit {
            font-size: 14px;
            color: #6b5d4f;
        }

        .health-status {
            display: inline-block;
            padding: 5px 15px;
            background: #4caf50;
            color: #fff;
            font-size: 14px;
            border-radius: 15px;
            margin-top: 10px;
        }

        .health-status.warning {
            background: #ff9800;
        }

        .chart-container {
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border: 1px solid #d4c4a8;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .chart-title {
            font-size: 20px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 20px;
            text-align: center;
        }

        .chart-placeholder {
            height: 250px;
            background: linear-gradient(135deg, #e8e0d0 0%, #d4c4a8 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #5a4a3a;
        }

        .records-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .record-card {
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border: 1px solid #d4c4a8;
            border-radius: 8px;
            padding: 25px;
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .record-title {
            font-size: 20px;
            font-weight: 700;
            color: #8b7355;
        }

        .add-btn {
            padding: 8px 20px;
            background: #8b7355;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', '思源宋体', serif;
        }

        .add-btn:hover {
            background: #7a6248;
        }

        .record-list {
            list-style: none;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #d4c4a8;
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .record-date {
            font-size: 14px;
            color: #6b5d4f;
        }

        .record-value {
            font-size: 16px;
            font-weight: 700;
            color: #5a4a3a;
        }

        .recommendation-card {
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border: 1px solid #d4c4a8;
            border-radius: 8px;
            padding: 30px;
        }

        .recommendation-title {
            font-size: 22px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .recommendation-list {
            list-style: none;
        }

        .recommendation-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #d4c4a8;
        }

        .recommendation-item:last-child {
            border-bottom: none;
        }

        .recommendation-icon {
            width: 40px;
            height: 40px;
            background: #8b7355;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            flex-shrink: 0;
        }

        .recommendation-content h4 {
            font-size: 18px;
            font-weight: 700;
            color: #5a4a3a;
            margin-bottom: 5px;
        }

        .recommendation-content p {
            font-size: 16px;
            color: #6b5d4f;
            line-height: 1.6;
        }

        .footer {
            background: linear-gradient(135deg, #f8f6f1 0%, #f0ebe3 100%);
            border-top: 2px solid #8b7355;
            padding: 40px 20px;
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #5a4a3a;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #8b7355;
        }

        .footer-copyright {
            color: #6b5d4f;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
            }

            .health-dashboard {
                grid-template-columns: repeat(2, 1fr);
            }

            .records-grid {
                grid-template-columns: 1fr;
            }

            .section {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <nav class="nav-wrapper" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 10 C30 10 15 30 15 50 C15 70 30 90 50 90 C70 90 85 70 85 50 C85 30 70 10 50 10" stroke="#8b7355" stroke-width="2" fill="none"/>
                    <path d="M50 20 L50 80" stroke="#8b7355" stroke-width="2"/>

    <main class="main-content">

                    <div class="chart-placeholder" id="bpChart">📊 正在加载血压趋势数据...</div>
                </div>
                <div class="chart-container" id="weightTrendContainer">
                    <h3 class="chart-title">体重变化趋势（近30天）</h3>
                    <div class="chart-placeholder" id="weightChart">📈 正在加载体重趋势数据...</div>

            <!-- 健康记录 -->
            <section class="section" id="recordsSection">

                    <!-- 记录将通过JS动态加载 -->

    <footer class="footer">

    <script>
        // ============================================
        // 后端API配置
        // ============================================
        const API_BASE_URL = 'http://localhost:8080/api';

        // ============================================
        // 今日健康数据模块 - 来自AI体质辨识输入的数据
        // ============================================
        const TodayHealthModule = {
            // 从后端获取今日健康数据
            async fetchTodayHealthData() {
                try {
                    const token = this.getToken();
                    if (!token) {
                        this.renderNoLogin();
                        return;
                    }

                    // 从后端获取用户健康数据
                    const response = await fetch(`${API_BASE_URL}/health/data`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success && result.data) {
                            this.renderTodayHealthData(result.data);
                            return;
                        }
                    }
                } catch (error) {
                    console.log('从后端获取失败:', error);
                }

                this.renderNoData();
            },

            // 渲染未登录状态
            renderNoLogin() {
                const container = document.getElementById('todayHealthData');
                if (!container) return;
                container.innerHTML = `
                    <div class="health-card" style="grid-column: span 4;">
                        <p style="color: #6b5d4f; text-align: center;">请先<a href="profile.html" style="color: #8b7355;">登录</a>查看健康数据</p>
                    </div>
                `;
            },

            // 渲染无数据状态
            renderNoData() {
                const container = document.getElementById('todayHealthData');
                if (!container) return;
                container.innerHTML = `
                    <div class="health-card" style="grid-column: span 4;">
                        <p style="color: #6b5d4f; text-align: center;">暂无健康数据，请先完成<a href="constitution.html" style="color: #8b7355;">AI体质辨识</a></p>
                    </div>
                `;
            },

            // 合并来自不同来源的健康数据
            mergeHealthData(constitutionData, manualData) {
                return {
                    heartRate: manualData.heartRate || constitutionData.heartRate || { value: 72, unit: '次/分', status: 'normal' },
                    bloodPressure: manualData.bloodPressure || constitutionData.bloodPressure || { value: '120/80', unit: 'mmHg', status: 'normal' },
                    bloodSugar: manualData.bloodSugar || constitutionData.bloodSugar || { value: 5.6, unit: 'mmol/L', status: 'normal' },
                    weight: manualData.weight || constitutionData.weight || { value: 65.5, unit: 'kg', status: 'warning' },
                    constitutionType: constitutionData.constitutionType || null,
                    lastUpdated: new Date().toISOString()
                };
            },

            // 渲染今日健康数据
            renderTodayHealthData(data) {
                const container = document.getElementById('todayHealthData');
                if (!container) return;

                const healthItems = [
                    {
                        icon: `<path d="M50 80 C50 80 20 55 20 35 C20 25 30 15 40 15 C45 15 50 20 50 25 C50 20 55 15 60 15 C70 15 80 25 80 35 C80 55 50 80 50 80" stroke="#8b7355" stroke-width="2" fill="none"/>`,
                        label: '心率',
                        value: data.heartRate?.value || '--',
                        unit: data.heartRate?.unit || '次/分',
                        status: data.heartRate?.status || 'normal',
                        statusText: this.getStatusText(data.heartRate?.status)
                    },
                    {
                        icon: `<circle cx="50" cy="50" r="30" stroke="#8b7355" stroke-width="2" fill="none"/><path d="M50 30 L50 50 L65 60" stroke="#8b7355" stroke-width="2" fill="none"/>`,
                        label: '血压',
                        value: data.bloodPressure?.value || '--',
                        unit: data.bloodPressure?.unit || 'mmHg',
                        status: data.bloodPressure?.status || 'normal',
                        statusText: this.getStatusText(data.bloodPressure?.status)
                    },
                    {
                        icon: `<path d="M30 50 Q50 30 70 50 Q50 70 30 50" stroke="#8b7355" stroke-width="2" fill="none"/><circle cx="50" cy="50" r="10" stroke="#8b7355" stroke-width="2" fill="none"/>`,
                        label: '血糖',
                        value: data.bloodSugar?.value || '--',
                        unit: data.bloodSugar?.unit || 'mmol/L',
                        status: data.bloodSugar?.status || 'normal',
                        statusText: this.getStatusText(data.bloodSugar?.status)
                    },
                    {
                        icon: `<path d="M30 70 Q50 20 70 70" stroke="#8b7355" stroke-width="2" fill="none"/><path d="M35 60 L35 40" stroke="#8b7355" stroke-width="2"/><path d="M65 60 L65 40" stroke="#8b7355" stroke-width="2"/>`,
                        label: '体重',
                        value: data.weight?.value || '--',
                        unit: data.weight?.unit || 'kg',
                        status: data.weight?.status || 'normal',
                        statusText: this.getStatusText(data.weight?.status)
                    }
                ];

                container.innerHTML = healthItems.map(item => `
                    <div class="health-card" data-type="${item.label}">
                        <svg class="health-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            ${item.icon}
                        </svg>
                        <p class="health-label">${item.label}</p>
                        <p class="health-value">${item.value} <span class="health-unit">${item.unit}</span></p>
                        <span class="health-status ${item.status === 'warning' ? 'warning' : ''}">${item.statusText}</span>
                    </div>
                `).join('');
            },

            getStatusText(status) {
                const statusMap = {
                    'normal': '正常',
                    'warning': '注意',
                    'danger': '异常'
                };
                return statusMap[status] || '正常';
            },

            getToken() {
                return localStorage.getItem('token') || '';
            }
        };

        // ============================================
        // AI健康建议模块 - 接收AI返回的JSON数据
        // ============================================
        const AIAdviceModule = {
            // 获取AI健康建议
            async fetchAIAdvice() {
                try {
                    const token = this.getToken();
                    if (!token) {
                        this.renderNoLogin();
                        return;
                    }

                    // 从后端获取AI建议
                    const response = await fetch(`${API_BASE_URL}/health/ai-advice`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        const result = await response.json();
                        if (result.success && result.data) {
                            this.renderAIAdvice(result.data);
                            return;
                        }
                    }
                } catch (error) {
                    console.error('获取AI建议失败:', error);
                }

                this.renderDefaultAdvice();
            },

            // 渲染未登录状态
            renderNoLogin() {
                const container = document.getElementById('aiAdviceContent');
                if (!container) return;
                container.innerHTML = `
                    <p style="color: #6b5d4f; text-align: center; padding: 20px;">请先<a href="profile.html" style="color: #8b7355;">登录</a>查看AI健康建议</p>
                `;
            },

            // 渲染AI健康建议
            renderAIAdvice(aiData) {
                const container = document.getElementById('aiAdviceContent');
                if (!container) return;

                if (!aiData.hasConstitution) {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 30px;">
                            <p style="color: #6b5d4f; font-size: 16px; margin-bottom: 20px;">${aiData.message}</p>
                            <p style="color: #8b7355; font-size: 18px; font-weight: 700;">${aiData.encouragement}</p>
                            <button onclick="window.location.href='constitution.html'" style="margin-top: 20px; padding: 12px 30px; background: #8b7355; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer;">开始体质辨识</button>
                        </div>
                    `;
                    return;
                }

                const adviceItems = [];

                if (aiData.healthAdvice) {
                    adviceItems.push({
                        icon: '💡',
                        title: '健康建议',
                        content: aiData.healthAdvice
                    });
                }

                if (aiData.dietaryRecommendations) {
                    adviceItems.push({
                        icon: '�',
                        title: '饮食建议',
                        content: aiData.dietaryRecommendations
                    });
                }

                if (aiData.exerciseRecommendations) {
                    adviceItems.push({
                        icon: '🏃',
                        title: '运动建议',
                        content: aiData.exerciseRecommendations
                    });
                }

                container.innerHTML = `
                    <ul class="recommendation-list">
                        ${adviceItems.map(item => `
                            <li class="recommendation-item">
                                <div class="recommendation-icon">${item.icon}</div>
                                <div class="recommendation-content">
                                    <h4>${item.title}</h4>
                                    <p>${item.content}</p>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                    <p style="color: #8b7355; font-size: 14px; margin-top: 15px; text-align: center;">✨ 基于您的体质类型：${aiData.constitutionType}</p>
                `;
            },

            // 渲染默认建议
            renderDefaultAdvice() {
                const defaultAdvice = {
                    diet: { icon: '🍎', title: '饮食建议', content: '您的体重略有上升趋势，建议控制晚餐摄入量，多吃蔬菜水果，少油少盐。' },
                    exercise: { icon: '🏃', title: '运动建议', content: '建议每天进行30分钟中等强度运动，如快走、太极拳等，有助于控制体重和血压。' },
                    sleep: { icon: '😴', title: '作息建议', content: '保持规律作息，建议晚上10点前入睡，保证7-8小时充足睡眠。' },
                    medication: { icon: '💊', title: '用药提醒', content: '请按时服用降压药，建议在每天固定时间测量血压并记录。' }
                };
                this.renderAIAdvice(defaultAdvice);
            },

            getToken() {
                return localStorage.getItem('token') || '';
            }
        };

        // ============================================
        // 健康趋势分析模块 - 与Spring Boot后端交互
        // ============================================
        const HealthTrendModule = {
            // 获取血压趋势数据
            async fetchBPTrend() {
                try {
                    const response = await fetch(`${API_BASE_URL}/health/trends/blood-pressure?days=7`, {
                        headers: { 'Authorization': `Bearer ${this.getToken()}` }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        this.renderBPChart(data);
                    } else {
                        this.renderBPChartDefault();
                    }
                } catch (error) {
                    console.error('获取血压趋势失败:', error);
                    this.renderBPChartDefault();
                }
            },

            // 获取体重趋势数据
            async fetchWeightTrend() {
                try {
                    const response = await fetch(`${API_BASE_URL}/health/trends/weight?days=30`, {
                        headers: { 'Authorization': `Bearer ${this.getToken()}` }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        this.renderWeightChart(data);
                    } else {
                        this.renderWeightChartDefault();
                    }
                } catch (error) {
                    console.error('获取体重趋势失败:', error);
                    this.renderWeightChartDefault();
                }
            },

            // 渲染血压图表
            renderBPChart(data) {
                const container = document.getElementById('bpChart');
                if (!container) return;

                // 期望的数据格式: [{ date: '2024-03-20', systolic: 120, diastolic: 80 }, ...]
                if (data && data.length > 0) {
                    container.innerHTML = `
                        <div style="padding: 20px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                                <span style="color: #8b7355; font-weight: 700;">收缩压/舒张压 (mmHg)</span>
                            </div>
                            <div style="display: flex; align-items: flex-end; height: 150px; gap: 10px; border-bottom: 2px solid #d4c4a8; padding-bottom: 10px;">
                                ${data.map(d => `
                                    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;">
                                        <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                                            <div style="width: 20px; height: ${d.systolic * 0.8}px; background: #8b7355; border-radius: 4px 4px 0 0;"></div>
                                            <div style="width: 20px; height: ${d.diastolic * 0.8}px; background: #c9b896; border-radius: 4px 4px 0 0;"></div>
                                        </div>
                                        <span style="font-size: 12px; color: #6b5d4f;">${d.date.slice(5)}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div style="display: flex; gap: 20px; margin-top: 15px; justify-content: center;">
                                <span style="display: flex; align-items: center; gap: 5px; font-size: 14px; color: #5a4a3a;">
                                    <span style="width: 12px; height: 12px; background: #8b7355; border-radius: 2px;"></span> 收缩压
                                </span>
                                <span style="display: flex; align-items: center; gap: 5px; font-size: 14px; color: #5a4a3a;">
                                    <span style="width: 12px; height: 12px; background: #c9b896; border-radius: 2px;"></span> 舒张压
                                </span>
                            </div>
                        </div>
                    `;
                } else {
                    this.renderBPChartDefault();
                }
            },

            // 渲染体重图表
            renderWeightChart(data) {
                const container = document.getElementById('weightChart');
                if (!container) return;

                // 期望的数据格式: [{ date: '2024-03-20', weight: 65.5 }, ...]
                if (data && data.length > 0) {
                    const maxWeight = Math.max(...data.map(d => d.weight));
                    const minWeight = Math.min(...data.map(d => d.weight));
                    const range = maxWeight - minWeight || 1;

                    container.innerHTML = `
                        <div style="padding: 20px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                                <span style="color: #8b7355; font-weight: 700;">体重 (kg)</span>
                                <span style="color: #6b5d4f; font-size: 14px;">${minWeight.toFixed(1)} - ${maxWeight.toFixed(1)}</span>
                            </div>
                            <div style="position: relative; height: 150px; border-bottom: 2px solid #d4c4a8; padding-bottom: 10px;">
                                <svg width="100%" height="100%" viewBox="0 0 ${data.length * 40} 150" preserveAspectRatio="none">
                                    <polyline
                                        fill="none"
                                        stroke="#8b7355"
                                        stroke-width="2"
                                        points="${data.map((d, i) => `${i * 40 + 20},${150 - ((d.weight - minWeight) / range * 120 + 15)}`).join(' ')}"
                                    />
                                    ${data.map((d, i) => `
                                        <circle cx="${i * 40 + 20}" cy="${150 - ((d.weight - minWeight) / range * 120 + 15)}" r="4" fill="#8b7355"/>
                                    `).join('')}
                                </svg>
                                <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                                    ${data.filter((_, i) => i % 5 === 0).map(d => `
                                        <span style="font-size: 12px; color: #6b5d4f;">${d.date.slice(5)}</span>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    this.renderWeightChartDefault();
                }
            },

            renderBPChartDefault() {
                const container = document.getElementById('bpChart');
                if (container) {
                    container.innerHTML = `
                        <div style="padding: 40px; text-align: center; color: #6b5d4f;">
                            <p>📊 暂无血压趋势数据</p>
                            <p style="font-size: 14px; margin-top: 10px;">请定期记录血压数据以查看趋势</p>
                        </div>
                    `;
                }
            },

            renderWeightChartDefault() {
                const container = document.getElementById('weightChart');
                if (container) {
                    container.innerHTML = `
                        <div style="padding: 40px; text-align: center; color: #6b5d4f;">
                            <p>📈 暂无体重趋势数据</p>
                            <p style="font-size: 14px; margin-top: 10px;">请定期记录体重数据以查看趋势</p>
                        </div>
                    `;
                }
            },

            getToken() {
                return localStorage.getItem('token') || '';
            }
        };

        // ============================================
        // 健康记录模块 - 来自AI体质辨识和手动输入
        // ============================================
        const HealthRecordsModule = {
            // 获取健康记录
            async fetchHealthRecords() {
                try {
                    const response = await fetch(`${API_BASE_URL}/health/records?limit=10`, {
                        headers: { 'Authorization': `Bearer ${this.getToken()}` }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        this.renderRecords(data);
                    } else {
                        // 从localStorage获取
                        this.renderRecordsFromLocal();
                    }
                } catch (error) {
                    console.error('获取健康记录失败:', error);
                    this.renderRecordsFromLocal();
                }
            },

            // 从localStorage渲染记录
            renderRecordsFromLocal() {
                const records = JSON.parse(localStorage.getItem('healthRecords') || '[]');
                
                // 如果没有记录，显示默认数据
                if (records.length === 0) {
                    const defaultRecords = {
                        bloodPressure: [
                            { date: '2024-03-20 08:30', value: '120/80 mmHg' },
                            { date: '2024-03-19 08:15', value: '118/78 mmHg' },
                            { date: '2024-03-18 08:45', value: '122/82 mmHg' },
                            { date: '2024-03-17 08:20', value: '119/79 mmHg' }
                        ],
                        bloodSugar: [
                            { date: '2024-03-20 07:00', value: '5.6 mmol/L' },
                            { date: '2024-03-19 07:15', value: '5.8 mmol/L' },
                            { date: '2024-03-18 07:00', value: '5.4 mmol/L' },
                            { date: '2024-03-17 07:30', value: '5.7 mmol/L' }
                        ]
                    };
                    this.renderRecords(defaultRecords);
                } else {
                    this.renderRecords(records);
                }
            },

            // 渲染记录
            renderRecords(data) {
                const container = document.getElementById('recordsGrid');
                if (!container) return;

                const recordTypes = [
                    { key: 'bloodPressure', title: '血压记录', unit: 'mmHg' },
                    { key: 'bloodSugar', title: '血糖记录', unit: 'mmol/L' },
                    { key: 'weight', title: '体重记录', unit: 'kg' },
                    { key: 'heartRate', title: '心率记录', unit: '次/分' }
                ];

                container.innerHTML = recordTypes.map(type => {
                    const records = data[type.key] || [];
                    return `
                        <div class="record-card" data-type="${type.key}">
                            <div class="record-header">
                                <h3 class="record-title">${type.title}</h3>
                                <button class="add-btn" onclick="HealthRecordsModule.showAddModal('${type.key}')">+ 添加记录</button>
                            </div>
                            <ul class="record-list">
                                ${records.length > 0 ? records.map(r => `
                                    <li class="record-item">
                                        <span class="record-date">${r.date}</span>
                                        <span class="record-value">${r.value}</span>
                                    </li>
                                `).join('') : `
                                    <li class="record-item" style="justify-content: center; color: #999;">
                                        暂无记录
                                    </li>
                                `}
                            </ul>
                        </div>
                    `;
                }).join('');
            },

            // 显示添加记录弹窗
            showAddModal(type) {
                const value = prompt(`请输入${this.getTypeName(type)}数值:`);
                if (value) {
                    this.addRecord(type, value);
                }
            },

            // 添加记录
            async addRecord(type, value) {
                const record = {
                    type: type,
                    value: value,
                    date: new Date().toLocaleString('zh-CN'),
                    timestamp: new Date().toISOString()
                };

                // 保存到localStorage
                const records = JSON.parse(localStorage.getItem('healthRecords') || '{}');
                if (!records[type]) records[type] = [];
                records[type].unshift(record);
                localStorage.setItem('healthRecords', JSON.stringify(records));

                // 尝试同步到后端
                try {
                    await fetch(`${API_BASE_URL}/health/records`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${this.getToken()}`
                        },
                        body: JSON.stringify(record)
                    });
                } catch (error) {
                    console.log('同步到后端失败，已保存到本地');
                }

                // 刷新显示
                this.renderRecordsFromLocal();
            },

            getTypeName(type) {
                const names = {
                    bloodPressure: '血压',
                    bloodSugar: '血糖',
                    weight: '体重',
                    heartRate: '心率'
                };
                return names[type] || type;
            },

            getToken() {
                return localStorage.getItem('token') || '';
            }
        };

        // ============================================
        // 页面初始化
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            const navbar = document.getElementById('navbar');
            
            // 导航栏滚动效果
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });

            // 初始化各模块数据
            initHealthPage();
        });

        async function initHealthPage() {
            // 并行加载各模块数据
            await Promise.all([
                TodayHealthModule.fetchTodayHealthData(),
                AIAdviceModule.fetchAIAdvice(),
                HealthTrendModule.fetchBPTrend(),
                HealthTrendModule.fetchWeightTrend(),
                HealthRecordsModule.fetchHealthRecords()
            ]);
        }
    </script>
</body>
</html>
