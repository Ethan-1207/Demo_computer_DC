<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 - 草本数智</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', '思源宋体', serif;
            background-color: #f7f5f0;
            color: #2c2c2c;
            line-height: 1.8;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #f8f6f1 0%, #f0ebe3 100%);
            border-bottom: 2px solid #8b7355;
            box-shadow: 0 2px 10px rgba(139, 115, 85, 0.1);
            transition: all 0.3s ease;
            animation: navSlideDown 1s ease-out;
        }

        .nav-wrapper.scrolled {
            height: 60px;
        }

        @keyframes navSlideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 120px;
            transition: height 0.3s ease;
        }

        .nav-wrapper.scrolled .nav-container {
            height: 60px;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            color: #8b7355;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-menu li a {
            text-decoration: none;
            color: #5a4a3a;
            font-size: 18px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu li a:hover,
        .nav-menu li a.active {
            color: #8b7355;
            background-color: rgba(139, 115, 85, 0.1);
        }

        .main-content {
            margin-top: 140px;
            padding-bottom: 60px;
        }

        /* 登录/注册容器 */
        .auth-container {
            max-width: 500px;
            margin: 60px auto;
            background: #fff;
            border: 2px solid #c9b896;
            border-radius: 12px;
            padding: 50px;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.08);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 10px;
        }

        .auth-header p {
            font-size: 16px;
            color: #6b5d4f;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #d4c4a8;
        }

        .auth-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            color: #6b5d4f;
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            color: #8b7355;
            border-bottom: 3px solid #8b7355;
        }

        .auth-tab:hover {
            color: #8b7355;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 16px;
            font-weight: 700;
            color: #5a4a3a;
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #d4c4a8;
            border-radius: 6px;
            font-size: 16px;
            font-family: 'Noto Serif SC', '思源宋体', serif;
            background: #faf8f5;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #8b7355;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: #8b7355;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', '思源宋体', serif;
        }

        .auth-btn:hover {
            background: #7a6248;
        }

        .auth-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        /* 用户资料区域 */
        .profile-content {
            display: none;
        }

        .profile-content.active {
            display: block;
        }

        .profile-header {
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border-bottom: 2px solid #c9b896;
            padding: 50px 0;
            margin-bottom: 50px;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b7355 0%, #a08060 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #fff;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.2);
        }

        .profile-details h1 {
            font-size: 32px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 10px;
        }

        .profile-details p {
            font-size: 16px;
            color: #6b5d4f;
            margin-bottom: 5px;
        }

        .section {
            margin-bottom: 60px;
            padding: 40px;
            background-color: #fff;
            border: 2px solid #c9b896;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.08);
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 25px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .save-btn {
            padding: 15px 40px;
            background: #8b7355;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', '思源宋体', serif;
        }

        .save-btn:hover {
            background: #7a6248;
        }

        .logout-btn {
            padding: 15px 40px;
            background: #f44336;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', '思源宋体', serif;
        }

        .logout-btn:hover {
            background: #d32f2f;
        }

        /* 加载状态 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(247, 245, 240, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f0ebe3;
            border-top: 4px solid #8b7355;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 消息提示 */
        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background: #4caf50;
            color: #fff;
            border-radius: 8px;
            font-size: 16px;
            z-index: 3000;
            animation: slideDown 0.3s ease;
        }

        .toast.error {
            background: #f44336;
        }

        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .auth-container {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <nav class="nav-wrapper" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 40px; height: 40px;">
                    <path d="M50 10 C30 10 15 30 15 50 C15 70 30 90 50 90 C70 90 85 70 85 50 C85 30 70 10 50 10" stroke="#8b7355" stroke-width="2" fill="none"/>
                    <path d="M50 20 L50 80" stroke="#8b7355" stroke-width="2"/>
                    <path d="M30 35 L70 35" stroke="#8b7355" stroke-width="2"/>
                    <path d="M30 50 L70 50" stroke="#8b7355" stroke-width="2"/>
                    <path d="M30 65 L70 65" stroke="#8b7355" stroke-width="2"/>
                </svg>
                <span>草本数智</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于我们</a></li>
                <li><a href="news.html">健康资讯</a></li>
                <li><a href="health.html">个人健康管理</a></li>
                <li><a href="family.html">子女父母健康看板</a></li>
                <li><a href="profile.html" class="active">我的</a></li>
                <li><a href="vip.html">会员</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <!-- 登录/注册区域 -->
            <div class="auth-container" id="authContainer">
                <div class="auth-header">
                    <h1>欢迎使用草本数智</h1>
                    <p>AI驱动的中医健康管理平台</p>
                </div>

                <div class="auth-tabs">
                    <div class="auth-tab active" data-tab="login">登录</div>
                    <div class="auth-tab" data-tab="register">注册</div>
                </div>

                <!-- 登录表单 -->
                <form class="auth-form active" id="loginForm">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-input" id="loginUsername" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="auth-btn" id="loginBtn">登录</button>
                </form>

                <!-- 注册表单 -->
                <form class="auth-form" id="registerForm">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-input" id="registerUsername" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" id="registerPassword" placeholder="请输入密码（至少6位）" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label class="form-label">确认密码</label>
                        <input type="password" class="form-input" id="registerConfirmPassword" placeholder="请再次输入密码" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">姓名</label>
                        <input type="text" class="form-input" id="registerName" placeholder="请输入您的姓名" required>
                    </div>
                    <button type="submit" class="auth-btn" id="registerBtn">注册</button>
                </form>
            </div>

            <!-- 用户资料区域 -->
            <div class="profile-content" id="profileContent">
                <div class="profile-header">
                    <div class="profile-info">
                        <div class="profile-avatar">👤</div>
                        <div class="profile-details">
                            <h1 id="profileName">加载中...</h1>
                            <p id="profileUsername">用户名：--</p>
                            <p id="profileRegTime">注册时间：--</p>
                        </div>
                    </div>
                </div>

                <section class="section">
                    <h2 class="section-title">个人资料</h2>
                    <form id="profileForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">姓名</label>
                                <input type="text" class="form-input" id="userName" name="name" value="">
                            </div>
                            <div class="form-group">
                                <label class="form-label">性别</label>
                                <select class="form-input" id="userGender" name="gender">
                                    <option value="">请选择</option>
                                    <option value="男">男</option>
                                    <option value="女">女</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">年龄</label>
                                <input type="number" class="form-input" id="userAge" name="age" value="" min="1" max="120">
                            </div>
                            <div class="form-group">
                                <label class="form-label">身高(cm)</label>
                                <input type="number" class="form-input" id="userHeight" name="height" value="" min="50" max="250">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">体重(kg)</label>
                            <input type="number" class="form-input" id="userWeight" name="weight" value="" min="20" max="200" step="0.1">
                        </div>
                        <button type="submit" class="save-btn" id="saveBtn">保存修改</button>
                    </form>
                </section>

                <section class="section">
                    <h2 class="section-title">AI体质分析结果</h2>
                    <div id="constitutionResult">
                        <p style="color: #6b5d4f; text-align: center;">暂无体质分析结果，请前往<a href="constitution.html" style="color: #8b7355;">体质辨识页面</a>进行测评</p>
                    </div>
                </section>

                <section class="section">
                    <h2 class="section-title">账户设置</h2>
                    <div style="text-align: center;">
                        <button class="logout-btn" id="logoutBtn">退出登录</button>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';

        const ProfileModule = {
            userData: null,

            init() {
                this.bindEvents();
                this.checkLoginStatus();
            },

            bindEvents() {
                const navbar = document.getElementById('navbar');

                window.addEventListener('scroll', () => {
                    if (window.scrollY > 50) {
                        navbar.classList.add('scrolled');
                    } else {
                        navbar.classList.remove('scrolled');
                    }
                });

                // 标签切换
                document.querySelectorAll('.auth-tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        this.switchTab(e.target.dataset.tab);
                    });
                });

                // 登录表单
                document.getElementById('loginForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.login();
                });

                // 注册表单
                document.getElementById('registerForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.register();
                });

                // 个人资料表单
                document.getElementById('profileForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.saveProfile();
                });

                // 退出登录
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    this.logout();
                });
            },

            switchTab(tab) {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                
                document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
                document.getElementById(`${tab}Form`).classList.add('active');
            },

            checkLoginStatus() {
                const token = localStorage.getItem('token');
                if (token) {
                    this.showProfile();
                    this.loadUserProfile();
                } else {
                    this.showAuth();
                }
            },

            showAuth() {
                document.getElementById('authContainer').style.display = 'block';
                document.getElementById('profileContent').style.display = 'none';
            },

            showProfile() {
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('profileContent').style.display = 'block';
            },

            async login() {
                const username = document.getElementById('loginUsername').value;
                const password = document.getElementById('loginPassword').value;
                const btn = document.getElementById('loginBtn');

                btn.disabled = true;
                btn.textContent = '登录中...';

                try {
                    const response = await fetch(`${API_BASE_URL}/user/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });

                    const result = await response.json();

                    if (result.success) {
                        localStorage.setItem('token', result.token);
                        localStorage.setItem('userId', result.user.id);
                        this.showToast('登录成功！');
                        this.showProfile();
                        this.loadUserProfile();
                    } else {
                        this.showToast(result.message, true);
                    }
                } catch (error) {
                    console.error('登录失败:', error);
                    this.showToast('登录失败，请稍后重试', true);
                }

                btn.disabled = false;
                btn.textContent = '登录';
            },

            async register() {
                const username = document.getElementById('registerUsername').value;
                const password = document.getElementById('registerPassword').value;
                const confirmPassword = document.getElementById('registerConfirmPassword').value;
                const name = document.getElementById('registerName').value;
                const btn = document.getElementById('registerBtn');

                if (password !== confirmPassword) {
                    this.showToast('两次输入的密码不一致', true);
                    return;
                }

                btn.disabled = true;
                btn.textContent = '注册中...';

                try {
                    const response = await fetch(`${API_BASE_URL}/user/register`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password, name })
                    });

                    const result = await response.json();

                    if (result.success) {
                        this.showToast('注册成功！请登录');
                        this.switchTab('login');
                        document.getElementById('loginUsername').value = username;
                        document.getElementById('loginPassword').value = '';
                    } else {
                        this.showToast(result.message, true);
                    }
                } catch (error) {
                    console.error('注册失败:', error);
                    this.showToast('注册失败，请稍后重试', true);
                }

                btn.disabled = false;
                btn.textContent = '注册';
            },

            async loadUserProfile() {
                const token = localStorage.getItem('token');
                if (!token) return;

                try {
                    const response = await fetch(`${API_BASE_URL}/user/info`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    const result = await response.json();

                    if (result.success && result.user) {
                        this.userData = result.user;
                        this.renderUserProfile(result.user);
                        this.fillProfileForm(result.user);
                        this.renderConstitutionResult(result.user);
                    }
                } catch (error) {
                    console.error('加载用户资料失败:', error);
                }
            },

            renderUserProfile(user) {
                document.getElementById('profileName').textContent = user.name || '未设置';
                document.getElementById('profileUsername').textContent = `用户名：${user.username}`;
                document.getElementById('profileRegTime').textContent = `注册时间：${this.formatDate(user.createdAt)}`;
            },

            fillProfileForm(user) {
                document.getElementById('userName').value = user.name || '';
                document.getElementById('userGender').value = user.gender || '';
                document.getElementById('userAge').value = user.age || '';
                document.getElementById('userHeight').value = user.height || '';
                document.getElementById('userWeight').value = user.weight || '';
            },

            renderConstitutionResult(user) {
                const container = document.getElementById('constitutionResult');
                
                if (!user.constitutionType) {
                    container.innerHTML = '<p style="color: #6b5d4f; text-align: center;">暂无体质分析结果，请前往<a href="constitution.html" style="color: #8b7355;">体质辨识页面</a>进行测评</p>';
                    return;
                }

                let html = `
                    <div style="background: #faf8f5; padding: 30px; border-radius: 8px; margin-bottom: 20px;">
                        <h3 style="font-size: 24px; color: #8b7355; margin-bottom: 15px;">您的体质类型</h3>
                        <p style="font-size: 28px; font-weight: bold; color: #8b7355; margin-bottom: 10px;">${user.constitutionType}</p>
                        ${user.constitutionDescription ? `<p style="font-size: 16px; color: #5a4a3a; line-height: 1.8;">${user.constitutionDescription}</p>` : ''}
                    </div>
                `;

                if (user.healthAdvice) {
                    html += `
                        <div style="background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d4c4a8;">
                            <h3 style="font-size: 20px; color: #8b7355; margin-bottom: 15px;">💡 养生建议</h3>
                            <p style="color: #5a4a3a; line-height: 1.8;">${user.healthAdvice}</p>
                        </div>
                    `;
                }

                if (user.dietaryRecommendations) {
                    html += `
                        <div style="background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d4c4a8;">
                            <h3 style="font-size: 20px; color: #8b7355; margin-bottom: 15px;">🍎 饮食建议</h3>
                            <p style="color: #5a4a3a; line-height: 1.8;">${user.dietaryRecommendations}</p>
                        </div>
                    `;
                }

                if (user.exerciseRecommendations) {
                    html += `
                        <div style="background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #d4c4a8;">
                            <h3 style="font-size: 20px; color: #8b7355; margin-bottom: 15px;">🏃 运动建议</h3>
                            <p style="color: #5a4a3a; line-height: 1.8;">${user.exerciseRecommendations}</p>
                        </div>
                    `;
                }

                container.innerHTML = html;
            },

            async saveProfile() {
                const token = localStorage.getItem('token');
                if (!token) {
                    this.showToast('请先登录', true);
                    return;
                }

                const userData = {
                    name: document.getElementById('userName').value,
                    gender: document.getElementById('userGender').value,
                    age: parseInt(document.getElementById('userAge').value) || null,
                    height: parseFloat(document.getElementById('userHeight').value) || null,
                    weight: parseFloat(document.getElementById('userWeight').value) || null
                };

                const btn = document.getElementById('saveBtn');
                btn.disabled = true;
                btn.textContent = '保存中...';

                try {
                    const response = await fetch(`${API_BASE_URL}/user/update`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(userData)
                    });

                    const result = await response.json();

                    if (result.success) {
                        this.showToast('保存成功！');
                        this.userData = result.user;
                        this.renderUserProfile(result.user);
                    } else {
                        this.showToast(result.message, true);
                    }
                } catch (error) {
                    console.error('保存失败:', error);
                    this.showToast('保存失败，请稍后重试', true);
                }

                btn.disabled = false;
                btn.textContent = '保存修改';
            },

            async logout() {
                const token = localStorage.getItem('token');
                if (token) {
                    try {
                        await fetch(`${API_BASE_URL}/user/logout`, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                    } catch (error) {
                        console.error('登出失败:', error);
                    }
                }

                localStorage.removeItem('token');
                localStorage.removeItem('userId');
                this.showToast('已退出登录');
                this.showAuth();
            },

            showToast(message, isError = false) {
                const toast = document.createElement('div');
                toast.className = `toast ${isError ? 'error' : ''}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            },

            formatDate(dateStr) {
                if (!dateStr) return '--';
                const date = new Date(dateStr);
                return date.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            ProfileModule.init();
        });
    </script>
</body>
</html>
