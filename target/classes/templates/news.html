<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康资讯 - 草本数智</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', '思源宋体', serif;
            background-color: #f7f5f0;
            color: #2c2c2c;
            line-height: 1.8;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #f8f6f1 0%, #f0ebe3 100%);
            border-bottom: 2px solid #8b7355;
            box-shadow: 0 2px 10px rgba(139, 115, 85, 0.1);
            transition: all 0.3s ease;
            animation: navSlideDown 1s ease-out;
        }

        .nav-wrapper.scrolled {
            height: 60px;
        }

        @keyframes navSlideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 120px;
            transition: height 0.3s ease;
        }

        .nav-wrapper.scrolled .nav-container {
            height: 60px;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            color: #8b7355;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-logo svg {
            width: 40px;
            height: 40px;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-menu li a {
            text-decoration: none;
            color: #5a4a3a;
            font-size: 18px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu li a:hover,
        .nav-menu li a.active {
            color: #8b7355;
            background-color: rgba(139, 115, 85, 0.1);
        }

        .nav-menu li a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 2px;
            background-color: #8b7355;
        }

        .main-content {
            margin-top: 140px;
            padding-bottom: 60px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 0;
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border-bottom: 2px solid #c9b896;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 15px;
        }

        .page-subtitle {
            font-size: 18px;
            color: #6b5d4f;
        }

        .section {
            margin-bottom: 60px;
            padding: 40px;
            background-color: #fff;
            border: 2px solid #c9b896;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.08);
        }

        .category-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-tab {
            padding: 12px 30px;
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border: 2px solid #d4c4a8;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            color: #5a4a3a;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', '思源宋体', serif;
        }

        .category-tab:hover,
        .category-tab.active {
            background: #8b7355;
            color: #fff;
            border-color: #8b7355;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .news-card {
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border: 1px solid #d4c4a8;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(139, 115, 85, 0.15);
        }

        .news-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #c9b896 0%, #a08060 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #fff;
        }

        .news-content {
            padding: 25px;
        }

        .news-category {
            display: inline-block;
            padding: 5px 15px;
            background: #8b7355;
            color: #fff;
            font-size: 14px;
            border-radius: 15px;
            margin-bottom: 12px;
        }

        .news-title {
            font-size: 20px;
            font-weight: 700;
            color: #5a4a3a;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .news-summary {
            font-size: 16px;
            color: #6b5d4f;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #8b7355;
        }

        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #8b7355;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .read-more:hover {
            background: #7a6248;
        }

        .featured-news {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .featured-main {
            grid-row: span 2;
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border: 1px solid #d4c4a8;
            border-radius: 8px;
            overflow: hidden;
        }

        .featured-main .news-image {
            height: 300px;
        }

        .featured-main .news-content {
            padding: 30px;
        }

        .featured-main .news-title {
            font-size: 24px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
        }

        .page-btn {
            width: 45px;
            height: 45px;
            border: 2px solid #d4c4a8;
            background: #fff;
            color: #5a4a3a;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', '思源宋体', serif;
        }

        .page-btn:hover,
        .page-btn.active {
            background: #8b7355;
            color: #fff;
            border-color: #8b7355;
        }

        /* 加载状态 */
        .loading-container {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0ebe3;
            border-top: 4px solid #8b7355;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 24px;
            color: #5a4a3a;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 16px;
            color: #6b5d4f;
        }

        /* 文章详情弹窗 */
        .article-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
        }

        .modal-content {
            position: relative;
            background: #fff;
            border-radius: 12px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border: none;
            background: #f5f1e8;
            border-radius: 50%;
            font-size: 24px;
            color: #5a4a3a;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: #8b7355;
            color: #fff;
        }

        .modal-body {
            max-height: 90vh;
            overflow-y: auto;
            padding: 0;
        }

        .article-header {
            padding: 40px 40px 30px;
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border-bottom: 2px solid #d4c4a8;
        }

        .article-category {
            display: inline-block;
            padding: 6px 16px;
            background: #8b7355;
            color: #fff;
            font-size: 14px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        .article-title {
            font-size: 28px;
            font-weight: 700;
            color: #5a4a3a;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .article-meta {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #6b5d4f;
        }

        .article-content {
            padding: 40px;
            font-size: 18px;
            line-height: 2;
            color: #2c2c2c;
        }

        .article-content h2 {
            font-size: 24px;
            color: #8b7355;
            margin: 30px 0 15px;
        }

        .article-content h3 {
            font-size: 20px;
            color: #5a4a3a;
            margin: 25px 0 12px;
        }

        .article-content p {
            margin-bottom: 15px;
        }

        .article-content ul,
        .article-content ol {
            margin: 15px 0;
            padding-left: 30px;
        }

        .article-content li {
            margin-bottom: 8px;
        }

        .article-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
        }

        .article-content blockquote {
            border-left: 4px solid #8b7355;
            padding-left: 20px;
            margin: 20px 0;
            color: #6b5d4f;
            font-style: italic;
        }

        /* 管理功能样式 */
        .admin-modal-content {
            max-width: 800px;
        }

        .admin-header {
            padding: 25px 40px;
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border-bottom: 2px solid #d4c4a8;
        }

        .admin-header h2 {
            font-size: 24px;
            color: #8b7355;
            margin: 0;
        }

        .admin-form {
            padding: 30px 40px;
        }

        .form-row {
            margin-bottom: 20px;
        }

        .form-row.two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 15px;
            font-weight: 700;
            color: #5a4a3a;
            margin-bottom: 8px;
        }

        .form-label .required {
            color: #e74c3c;
        }

        .form-input {
            padding: 12px 15px;
            border: 2px solid #d4c4a8;
            border-radius: 6px;
            font-size: 15px;
            font-family: 'Noto Serif SC', '思源宋体', serif;
            background: #fff;
            color: #5a4a3a;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #8b7355;
            box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
        }

        .form-textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #d4c4a8;
            border-radius: 6px;
            font-size: 15px;
            font-family: 'Noto Serif SC', '思源宋体', serif;
            background: #fff;
            color: #5a4a3a;
            resize: vertical;
            transition: all 0.3s ease;
        }

        .form-textarea:focus {
            outline: none;
            border-color: #8b7355;
            box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
        }

        .form-textarea.content-editor {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #8b7355;
        }

        .editor-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .editor-toolbar button {
            padding: 6px 12px;
            background: #f5f1e8;
            border: 1px solid #d4c4a8;
            border-radius: 4px;
            font-size: 13px;
            color: #5a4a3a;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .editor-toolbar button:hover {
            background: #8b7355;
            color: #fff;
            border-color: #8b7355;
        }

        .form-hint {
            font-size: 13px;
            color: #8b7355;
            margin-top: 8px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #d4c4a8;
        }

        .btn-primary, .btn-secondary {
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', '思源宋体', serif;
        }

        .btn-primary {
            background: #8b7355;
            color: #fff;
            border: 2px solid #8b7355;
        }

        .btn-primary:hover {
            background: #7a6248;
            border-color: #7a6248;
        }

        .btn-secondary {
            background: transparent;
            color: #8b7355;
            border: 2px solid #8b7355;
        }

        .btn-secondary:hover {
            background: rgba(139, 115, 85, 0.1);
        }

        /* 管理悬浮按钮 */
        .admin-floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: #8b7355;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.4);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .admin-floating-btn:hover {
            background: #7a6248;
            transform: scale(1.1);
        }

        .admin-floating-btn span {
            font-size: 28px;
        }

        /* 文章卡片管理按钮 */
        .news-card {
            position: relative;
        }

        .card-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: none;
            gap: 5px;
        }

        .news-card:hover .card-actions {
            display: flex;
        }

        .card-action-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .card-action-btn.edit {
            background: #3498db;
            color: #fff;
        }

        .card-action-btn.edit:hover {
            background: #2980b9;
        }

        .card-action-btn.delete {
            background: #e74c3c;
            color: #fff;
        }

        .card-action-btn.delete:hover {
            background: #c0392b;
        }

        .footer {
            background: linear-gradient(135deg, #f8f6f1 0%, #f0ebe3 100%);
            border-top: 2px solid #8b7355;
            padding: 40px 20px;
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #5a4a3a;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #8b7355;
        }

        .footer-copyright {
            color: #6b5d4f;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
            }

            .news-grid {
                grid-template-columns: 1fr;
            }

            .featured-news {
                grid-template-columns: 1fr;
            }

            .featured-main {
                grid-row: span 1;
            }

            .featured-main .news-image {
                height: 200px;
            }

            .section {
                padding: 25px;
            }

            .modal-content {
                max-height: 95vh;
                margin: 10px;
            }

            .article-header {
                padding: 25px;
            }

            .article-title {
                font-size: 22px;
            }

            .article-content {
                padding: 25px;
                font-size: 16px;
            }

            .category-tabs {
                gap: 10px;
            }

            .category-tab {
                padding: 10px 20px;
                font-size: 14px;
            }

            .admin-modal-content {
                max-width: 100%;
                margin: 10px;
            }

            .admin-form {
                padding: 20px;
            }

            .form-row.two-col {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn-primary, .btn-secondary {
                width: 100%;
            }

            .admin-floating-btn {
                width: 50px;
                height: 50px;
                bottom: 20px;
                right: 20px;
            }

            .admin-floating-btn span {
                font-size: 24px;
            }
        }
    </style>
</head>

    <main class="main-content">
        <div class="page-header">
            <div class="container">
                <h1 class="page-title">健康资讯</h1>
                <p class="page-subtitle">权威养生资讯，守护您的健康</p>
            </div>
        </div>

        <div class="container">
            <section class="section">
                <!-- 分类标签 -->
                <div class="category-tabs" id="categoryTabs">
                    <button class="category-tab active" data-category="all">全部资讯</button>
                    <button class="category-tab" data-category="solar-term">节气养生</button>
                    <button class="category-tab" data-category="chronic">慢病管理</button>
                    <button class="category-tab" data-category="diet">食疗保健</button>
                    <button class="category-tab" data-category="exercise">运动养生</button>
                    <button class="category-tab" data-category="anti-fraud">防骗科普</button>
                </div>

                <!-- 加载状态 -->
                <div class="loading-container" id="loadingContainer" style="display: none;">
                    <div class="loading-spinner"></div>
                    <p>正在加载资讯...</p>
                </div>

                <!-- 推荐文章区域 -->
                <div class="featured-news" id="featuredNews">
                    <!-- 动态加载 -->
                </div>

                <!-- 文章列表 -->
                <div class="news-grid" id="newsGrid">
                    <!-- 动态加载 -->
                </div>

                <!-- 空状态提示 -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">📰</div>
                    <h3>暂无相关文章</h3>
                    <p>该分类下暂时没有文章，请选择其他分类查看</p>
                </div>

                <!-- 分页 -->
                <div class="pagination" id="pagination">
                    <!-- 动态加载 -->
                </div>
            </section>
        </div>

    <script>
        // ============================================
        // 后端API配置
        // ============================================
        const API_BASE_URL = 'http://localhost:8080/api';

        // 分类映射
        const CATEGORY_MAP = {
            'all': '全部资讯',
            'solar-term': '节气养生',
            'chronic': '慢病管理',
            'diet': '食疗保健',
            'exercise': '运动养生',
            'anti-fraud': '防骗科普'
        };

        // 分类图标映射
        const CATEGORY_ICONS = {
            'solar-term': '🌿',
            'chronic': '💊',
            'diet': '🥗',
            'exercise': '🏃',
            'anti-fraud': '⚠️',
            'default': '📰'
        };

        // ============================================
        // 资讯模块
        // ============================================
        const NewsModule = {
            currentCategory: 'all',
            currentPage: 1,
            pageSize: 6,
            totalPages: 1,
            articles: [],

            // 初始化
            init() {
                this.bindEvents();
                this.loadArticles();
            },

            // 绑定事件
            bindEvents() {
                // 分类标签点击事件
                const tabs = document.querySelectorAll('.category-tab');
                tabs.forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        const category = e.target.dataset.category;
                        this.switchCategory(category);
                    });
                });

                // 导航栏滚动效果
                const navbar = document.getElementById('navbar');
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 50) {
                        navbar.classList.add('scrolled');
                    } else {
                        navbar.classList.remove('scrolled');
                    }
                });
            },

            // 切换分类
            switchCategory(category) {
                this.currentCategory = category;
                this.currentPage = 1;

                // 更新标签样式
                document.querySelectorAll('.category-tab').forEach(tab => {
                    tab.classList.remove('active');
                    if (tab.dataset.category === category) {
                        tab.classList.add('active');
                    }
                });

                this.loadArticles();
            },

            // 加载文章列表
            async loadArticles() {
                this.showLoading(true);

                try {
                    // 构建请求参数
                    const params = new URLSearchParams({
                        page: this.currentPage,
                        size: this.pageSize,
                        category: this.currentCategory === 'all' ? '' : this.currentCategory
                    });

                    // 调用后端API
                    const response = await fetch(`${API_BASE_URL}/articles?${params}`, {
                        headers: {
                            'Authorization': `Bearer ${this.getToken()}`
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        this.articles = data.articles || [];
                        this.totalPages = data.totalPages || 1;
                        this.renderArticles();
                    } else {
                        // 使用模拟数据
                        this.loadMockArticles();
                    }
                } catch (error) {
                    console.error('加载文章失败:', error);
                    this.loadMockArticles();
                }

                this.showLoading(false);
            },

            // 加载模拟数据（后端不可用时）
            loadMockArticles() {
                const mockArticles = [
                    {
                        id: 1,
                        title: '春分养生指南：阴阳平衡，调理身心',
                        summary: '春分时节，昼夜平分，阴阳平衡。此时养生应顺应自然规律，注重调和阴阳，保持身心平衡。本文为您详细介绍春分时节的养生要点...',
                        category: 'solar-term',
                        author: '张医师',
                        publishDate: '2024-03-20',
                        views: 1250,
                        isFeatured: true,
                        icon: '🌿'
                    },
                    {
                        id: 2,
                        title: '高血压患者春季调理方案',
                        summary: '春季气温变化大，高血压患者需特别注意血压管理。本文为您介绍春季高血压的中医调理方法...',
                        category: 'chronic',
                        author: '李医师',
                        publishDate: '2024-03-18',
                        views: 980,
                        isFeatured: true,
                        icon: '💊'
                    },
                    {
                        id: 3,
                        title: '春季养肝食谱推荐',
                        summary: '春季养肝正当时，这些食材帮您护肝明目。推荐5道简单易做的养肝食谱...',
                        category: 'diet',
                        author: '王营养师',
                        publishDate: '2024-03-15',
                        views: 1560,
                        isFeatured: true,
                        icon: '🥗'
                    },
                    {
                        id: 4,
                        title: '适合中老年人的春季运动指南',
                        summary: '春季是运动的好时节，但中老年人在运动时需要特别注意运动强度和方式。本文为您推荐几种适合春季的养生运动...',
                        category: 'exercise',
                        author: '陈教练',
                        publishDate: '2024-03-12',
                        views: 890,
                        isFeatured: false,
                        icon: '🏃'
                    },
                    {
                        id: 5,
                        title: '警惕！这些养生谣言您中招了吗？',
                        summary: '网络上充斥着各种养生谣言，很多中老年人容易上当受骗。本文为您揭秘最常见的养生谣言...',
                        category: 'anti-fraud',
                        author: '刘专家',
                        publishDate: '2024-03-10',
                        views: 2100,
                        isFeatured: false,
                        icon: '⚠️'
                    },
                    {
                        id: 6,
                        title: '惊蛰养生：春雷响，万物长',
                        summary: '惊蛰时节，春雷始鸣，万物复苏。此时人体阳气生发，养生应顺应春气，早睡早起，适当运动...',
                        category: 'solar-term',
                        author: '张医师',
                        publishDate: '2024-03-05',
                        views: 1120,
                        isFeatured: false,
                        icon: '🧘'
                    },
                    {
                        id: 7,
                        title: '糖尿病患者的中医调理方法',
                        summary: '中医在糖尿病调理方面有着独特的优势，通过饮食调理、穴位按摩等方法，可以有效辅助控制血糖...',
                        category: 'chronic',
                        author: '李医师',
                        publishDate: '2024-03-01',
                        views: 1350,
                        isFeatured: false,
                        icon: '💆'
                    }
                ];

                // 根据分类筛选
                if (this.currentCategory !== 'all') {
                    this.articles = mockArticles.filter(a => a.category === this.currentCategory);
                } else {
                    this.articles = mockArticles;
                }

                this.totalPages = Math.ceil(this.articles.length / this.pageSize);
                this.renderArticles();
            },

            // 渲染文章列表
            renderArticles() {
                const featuredContainer = document.getElementById('featuredNews');
                const newsGrid = document.getElementById('newsGrid');
                const emptyState = document.getElementById('emptyState');

                // 清空容器
                if (featuredContainer) featuredContainer.innerHTML = '';
                if (newsGrid) newsGrid.innerHTML = '';

                // 检查是否有文章
                if (this.articles.length === 0) {
                    if (emptyState) emptyState.style.display = 'block';
                    this.renderPagination();
                    return;
                }

                if (emptyState) emptyState.style.display = 'none';

                // 分离推荐文章和普通文章
                const featuredArticles = this.articles.filter(a => a.isFeatured);
                const normalArticles = this.articles.filter(a => !a.isFeatured);

                // 渲染推荐文章（只在第一页且选择全部时显示）
                if (this.currentPage === 1 && this.currentCategory === 'all' && featuredArticles.length > 0) {
                    this.renderFeaturedArticles(featuredArticles.slice(0, 3));
                }

                // 渲染普通文章
                const startIndex = (this.currentPage - 1) * this.pageSize;
                const endIndex = startIndex + this.pageSize;
                const pageArticles = normalArticles.slice(startIndex, endIndex);

                pageArticles.forEach(article => {
                    const card = this.createArticleCard(article);
                    if (newsGrid) newsGrid.appendChild(card);
                });

                // 渲染分页
                this.renderPagination();
            },

            // 渲染推荐文章
            renderFeaturedArticles(articles) {
                const container = document.getElementById('featuredNews');
                if (!container || articles.length === 0) return;

                // 第一篇作为主推荐
                const mainArticle = articles[0];
                const sideArticles = articles.slice(1);

                let html = `
                    <div class="featured-main" onclick="NewsModule.openArticle(${mainArticle.id})">
                        <div class="news-image">${mainArticle.icon || CATEGORY_ICONS[mainArticle.category] || CATEGORY_ICONS.default}</div>
                        <div class="news-content">
                            <span class="news-category">${CATEGORY_MAP[mainArticle.category] || mainArticle.category}</span>
                            <h3 class="news-title">${mainArticle.title}</h3>
                            <p class="news-summary">${mainArticle.summary}</p>
                            <div class="news-meta">
                                <span>${mainArticle.publishDate}</span>
                                <span>👁 ${mainArticle.views || 0} 阅读</span>
                            </div>
                        </div>
                    </div>
                `;

                // 侧边推荐文章
                sideArticles.forEach(article => {
                    html += `
                        <div class="news-card" onclick="NewsModule.openArticle(${article.id})">
                            <div class="news-image">${article.icon || CATEGORY_ICONS[article.category] || CATEGORY_ICONS.default}</div>
                            <div class="news-content">
                                <span class="news-category">${CATEGORY_MAP[article.category] || article.category}</span>
                                <h3 class="news-title">${article.title}</h3>
                                <p class="news-summary">${article.summary}</p>
                                <div class="news-meta">
                                    <span>${article.publishDate}</span>
                                    <span>👁 ${article.views || 0} 阅读</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            },

            // 创建文章卡片
            createArticleCard(article) {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.dataset.articleId = article.id;
                card.onclick = (e) => {
                    // 如果点击的是管理按钮，不触发打开文章
                    if (e.target.closest('.card-actions')) return;
                    this.openArticle(article.id);
                };

                // 检查是否是管理员
                const isAdmin = NewsAdminModule.isAdmin();

                card.innerHTML = `
                    <div class="news-image">${article.icon || CATEGORY_ICONS[article.category] || CATEGORY_ICONS.default}</div>
                    <div class="news-content">
                        <span class="news-category">${CATEGORY_MAP[article.category] || article.category}</span>
                        <h3 class="news-title">${article.title}</h3>
                        <p class="news-summary">${article.summary}</p>
                        <div class="news-meta">
                            <span>${article.publishDate}</span>
                            <span>👁 ${article.views || 0} 阅读</span>
                        </div>
                    </div>
                    ${isAdmin ? `
                    <div class="card-actions">
                        <button class="card-action-btn edit" onclick="NewsAdminModule.editArticle(${article.id})" title="编辑">✏️</button>
                        <button class="card-action-btn delete" onclick="NewsAdminModule.deleteArticle(${article.id})" title="删除">🗑️</button>
                    </div>
                    ` : ''}
                `;

                return card;
            },

            // 渲染分页
            renderPagination() {
                const container = document.getElementById('pagination');
                if (!container) return;

                if (this.totalPages <= 1) {
                    container.innerHTML = '';
                    return;
                }

                let html = '';

                // 上一页
                html += `<button class="page-btn" onclick="NewsModule.goToPage(${this.currentPage - 1})" ${this.currentPage === 1 ? 'disabled' : ''}>←</button>`;

                // 页码
                for (let i = 1; i <= this.totalPages; i++) {
                    if (i === 1 || i === this.totalPages || (i >= this.currentPage - 1 && i <= this.currentPage + 1)) {
                        html += `<button class="page-btn ${i === this.currentPage ? 'active' : ''}" onclick="NewsModule.goToPage(${i})">${i}</button>`;
                    } else if (i === this.currentPage - 2 || i === this.currentPage + 2) {
                        html += `<span class="page-btn" style="cursor: default; border: none;">...</span>`;
                    }
                }

                // 下一页
                html += `<button class="page-btn" onclick="NewsModule.goToPage(${this.currentPage + 1})" ${this.currentPage === this.totalPages ? 'disabled' : ''}>→</button>`;

                container.innerHTML = html;
            },

            // 跳转到指定页
            goToPage(page) {
                if (page < 1 || page > this.totalPages) return;
                this.currentPage = page;
                this.loadArticles();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            // 打开文章详情
            async openArticle(articleId) {
                const modal = document.getElementById('articleModal');
                const modalBody = document.getElementById('modalBody');

                // 显示加载中
                modalBody.innerHTML = `
                    <div style="text-align: center; padding: 60px;">
                        <div class="loading-spinner"></div>
                        <p>正在加载文章...</p>
                    </div>
                `;
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';

                try {
                    // 调用后端API获取文章详情
                    const response = await fetch(`${API_BASE_URL}/articles/${articleId}`, {
                        headers: {
                            'Authorization': `Bearer ${this.getToken()}`
                        }
                    });

                    if (response.ok) {
                        const article = await response.json();
                        this.renderArticleDetail(article);
                    } else {
                        // 从本地数据查找
                        const article = this.articles.find(a => a.id === articleId);
                        if (article) {
                            this.renderArticleDetail({
                                ...article,
                                content: this.generateMockContent(article)
                            });
                        }
                    }
                } catch (error) {
                    console.error('加载文章详情失败:', error);
                    const article = this.articles.find(a => a.id === articleId);
                    if (article) {
                        this.renderArticleDetail({
                            ...article,
                            content: this.generateMockContent(article)
                        });
                    }
                }
            },

            // 渲染文章详情
            renderArticleDetail(article) {
                const modalBody = document.getElementById('modalBody');

                modalBody.innerHTML = `
                    <div class="article-header">
                        <span class="article-category">${CATEGORY_MAP[article.category] || article.category}</span>
                        <h1 class="article-title">${article.title}</h1>
                        <div class="article-meta">
                            <span>👤 ${article.author || '匿名'}</span>
                            <span>📅 ${article.publishDate}</span>
                            <span>👁 ${article.views || 0} 阅读</span>
                        </div>
                    </div>
                    <div class="article-content">
                        ${article.content || article.summary}
                    </div>
                `;
            },

            // 生成模拟文章内容
            generateMockContent(article) {
                return `
                    <p>${article.summary}</p>
                    <h2>一、为什么要重视${article.title.split('：')[0]}</h2>
                    <p>随着生活节奏的加快，越来越多的人开始关注养生保健。${article.title}是中医养生中的重要内容，对于维护身体健康具有重要意义。</p>
                    <p>中医认为，人体是一个有机的整体，各个脏腑之间相互联系、相互影响。通过科学的养生方法，可以达到预防疾病、强身健体的目的。</p>
                    
                    <h2>二、${article.title.split('：')[0]}的核心要点</h2>
                    <p>1. <strong>顺应自然规律</strong>：根据四季变化调整作息和饮食，做到"春夏养阳，秋冬养阴"。</p>
                    <p>2. <strong>饮食调理</strong>：选择适合自身体质的食物，避免过食生冷、油腻、辛辣之品。</p>
                    <p>3. <strong>适度运动</strong>：坚持适量运动，如太极拳、八段锦、散步等，增强体质。</p>
                    <p>4. <strong>情志调节</strong>：保持心情愉悦，避免过度紧张、焦虑、愤怒等不良情绪。</p>
                    
                    <h2>三、实用建议</h2>
                    <ul>
                        <li>每天保证充足的睡眠时间，早睡早起</li>
                        <li>饮食清淡，多吃新鲜蔬菜水果</li>
                        <li>适当进行户外活动，呼吸新鲜空气</li>
                        <li>定期进行体检，及时发现健康问题</li>
                        <li>学习一些简单的穴位按摩方法，自我保健</li>
                    </ul>
                    
                    <h2>四、注意事项</h2>
                    <blockquote>
                        养生是一个长期的过程，需要持之以恒。不要盲目跟风，要根据自身情况选择合适的养生方法。如有疾病，请及时就医。
                    </blockquote>
                    
                    <p>希望本文对您有所帮助，祝您身体健康！</p>
                `;
            },

            // 关闭文章详情
            closeArticle() {
                const modal = document.getElementById('articleModal');
                modal.style.display = 'none';
                document.body.style.overflow = '';
            },

            // 显示/隐藏加载状态
            showLoading(show) {
                const loadingContainer = document.getElementById('loadingContainer');
                const featuredNews = document.getElementById('featuredNews');
                const newsGrid = document.getElementById('newsGrid');

                if (loadingContainer) loadingContainer.style.display = show ? 'block' : 'none';
                if (featuredNews) featuredNews.style.display = show ? 'none' : '';
                if (newsGrid) newsGrid.style.display = show ? 'none' : '';
            },

            getToken() {
                return localStorage.getItem('token') || '';
            }
        };

        // ============================================
        // 文章管理模块（管理员功能）
        // ============================================
        const NewsAdminModule = {
            isEditMode: false,
            editingArticleId: null,

            // 检查是否是管理员
            isAdmin() {
                // 从localStorage获取用户角色
                const userRole = localStorage.getItem('userRole');
                return userRole === 'admin' || userRole === 'editor';
            },

            // 初始化管理员功能
            init() {
                // 显示管理按钮（如果是管理员）
                if (this.isAdmin()) {
                    const adminBtn = document.getElementById('adminBtn');
                    if (adminBtn) adminBtn.style.display = 'flex';
                }

                // 绑定表单提交事件
                const form = document.getElementById('articleForm');
                if (form) {
                    form.addEventListener('submit', (e) => {
                        e.preventDefault();
                        this.saveArticle();
                    });
                }
            },

            // 打开管理弹窗（新增模式）
            openAdminModal() {
                this.isEditMode = false;
                this.editingArticleId = null;
                document.getElementById('adminModalTitle').textContent = '发布新文章';
                document.getElementById('submitBtn').textContent = '发布文章';
                this.resetForm();
                
                const modal = document.getElementById('adminModal');
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            },

            // 关闭管理弹窗
            closeAdminModal() {
                const modal = document.getElementById('adminModal');
                modal.style.display = 'none';
                document.body.style.overflow = '';
                this.resetForm();
            },

            // 重置表单
            resetForm() {
                document.getElementById('articleForm').reset();
                document.getElementById('editArticleId').value = '';
            },

            // 编辑文章
            async editArticle(articleId) {
                this.isEditMode = true;
                this.editingArticleId = articleId;
                document.getElementById('adminModalTitle').textContent = '编辑文章';
                document.getElementById('submitBtn').textContent = '保存修改';

                // 查找文章数据
                const article = NewsModule.articles.find(a => a.id === articleId);
                if (!article) {
                    alert('文章不存在');
                    return;
                }

                // 填充表单
                document.getElementById('editArticleId').value = article.id;
                document.getElementById('articleTitle').value = article.title;
                document.getElementById('articleCategory').value = article.category;
                document.getElementById('articleIcon').value = article.icon || '';
                document.getElementById('articleAuthor').value = article.author || '';
                document.getElementById('articleFeatured').checked = article.isFeatured || false;
                document.getElementById('articleSummary').value = article.summary;
                
                // 获取完整内容
                try {
                    const response = await fetch(`${API_BASE_URL}/articles/${articleId}`, {
                        headers: { 'Authorization': `Bearer ${this.getToken()}` }
                    });
                    if (response.ok) {
                        const fullArticle = await response.json();
                        document.getElementById('articleContent').value = fullArticle.content || '';
                    } else {
                        document.getElementById('articleContent').value = article.summary || '';
                    }
                } catch (error) {
                    document.getElementById('articleContent').value = article.summary || '';
                }

                const modal = document.getElementById('adminModal');
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            },

            // 保存文章（新增或更新）
            async saveArticle() {
                const articleData = {
                    title: document.getElementById('articleTitle').value,
                    category: document.getElementById('articleCategory').value,
                    icon: document.getElementById('articleIcon').value,
                    author: document.getElementById('articleAuthor').value,
                    isFeatured: document.getElementById('articleFeatured').checked,
                    summary: document.getElementById('articleSummary').value,
                    content: document.getElementById('articleContent').value,
                    publishDate: new Date().toISOString().split('T')[0]
                };

                try {
                    let response;
                    if (this.isEditMode) {
                        // 更新文章
                        response = await fetch(`${API_BASE_URL}/articles/${this.editingArticleId}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${this.getToken()}`
                            },
                            body: JSON.stringify(articleData)
                        });
                    } else {
                        // 新增文章
                        response = await fetch(`${API_BASE_URL}/articles`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${this.getToken()}`
                            },
                            body: JSON.stringify(articleData)
                        });
                    }

                    if (response.ok) {
                        alert(this.isEditMode ? '文章更新成功！' : '文章发布成功！');
                        this.closeAdminModal();
                        // 刷新文章列表
                        NewsModule.loadArticles();
                    } else {
                        // 模拟成功（后端不可用时）
                        this.mockSaveArticle(articleData);
                    }
                } catch (error) {
                    console.error('保存文章失败:', error);
                    this.mockSaveArticle(articleData);
                }
            },

            // 模拟保存（后端不可用时）
            mockSaveArticle(articleData) {
                if (this.isEditMode) {
                    // 更新本地数据
                    const index = NewsModule.articles.findIndex(a => a.id === this.editingArticleId);
                    if (index !== -1) {
                        NewsModule.articles[index] = { ...NewsModule.articles[index], ...articleData };
                    }
                    alert('文章更新成功！（本地模式）');
                } else {
                    // 新增本地数据
                    const newArticle = {
                        id: Date.now(),
                        ...articleData,
                        views: 0
                    };
                    NewsModule.articles.unshift(newArticle);
                    alert('文章发布成功！（本地模式）');
                }
                this.closeAdminModal();
                NewsModule.renderArticles();
            },

            // 删除文章
            async deleteArticle(articleId) {
                if (!confirm('确定要删除这篇文章吗？此操作不可恢复。')) {
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE_URL}/articles/${articleId}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${this.getToken()}`
                        }
                    });

                    if (response.ok) {
                        alert('文章删除成功！');
                        NewsModule.loadArticles();
                    } else {
                        // 模拟删除
                        this.mockDeleteArticle(articleId);
                    }
                } catch (error) {
                    console.error('删除文章失败:', error);
                    this.mockDeleteArticle(articleId);
                }
            },

            // 模拟删除
            mockDeleteArticle(articleId) {
                const index = NewsModule.articles.findIndex(a => a.id === articleId);
                if (index !== -1) {
                    NewsModule.articles.splice(index, 1);
                    NewsModule.renderArticles();
                    alert('文章删除成功！（本地模式）');
                }
            },

            // 插入HTML标签
            insertTag(tagName) {
                const textarea = document.getElementById('articleContent');
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = textarea.value;
                const selectedText = text.substring(start, end);

                let insertText = '';
                switch(tagName) {
                    case 'h2':
                        insertText = `<h2>${selectedText || '标题'}</h2>`;
                        break;
                    case 'h3':
                        insertText = `<h3>${selectedText || '小标题'}</h3>`;
                        break;
                    case 'p':
                        insertText = `<p>${selectedText || '段落内容'}</p>`;
                        break;
                    case 'strong':
                        insertText = `<strong>${selectedText || '加粗文字'}</strong>`;
                        break;
                    case 'ul':
                        insertText = `<ul>\n  <li>${selectedText || '列表项1'}</li>\n  <li>列表项2</li>\n</ul>`;
                        break;
                    case 'blockquote':
                        insertText = `<blockquote>${selectedText || '引用内容'}</blockquote>`;
                        break;
                }

                textarea.value = text.substring(0, start) + insertText + text.substring(end);
                textarea.focus();
                textarea.selectionStart = textarea.selectionEnd = start + insertText.length;
            },

            getToken() {
                return localStorage.getItem('token') || '';
            }
        };

        // ============================================
        // 页面初始化
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            NewsModule.init();
            NewsAdminModule.init();
        });

        // ESC键关闭弹窗
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                NewsModule.closeArticle();
                NewsAdminModule.closeAdminModal();
            }
        });
    </script>
</body>
</html>
