<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子女父母健康看板 - 草本数智</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', '思源宋体', serif;
            background-color: #f7f5f0;
            color: #2c2c2c;
            line-height: 1.8;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #f8f6f1 0%, #f0ebe3 100%);
            border-bottom: 2px solid #8b7355;
            box-shadow: 0 2px 10px rgba(139, 115, 85, 0.1);
            transition: all 0.3s ease;
            animation: navSlideDown 1s ease-out;
        }

        .nav-wrapper.scrolled {
            height: 60px;
        }

        @keyframes navSlideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 120px;
            transition: height 0.3s ease;
        }

        .nav-wrapper.scrolled .nav-container {
            height: 60px;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            color: #8b7355;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-logo svg {
            width: 40px;
            height: 40px;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-menu li a {
            text-decoration: none;
            color: #5a4a3a;
            font-size: 18px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu li a:hover,
        .nav-menu li a.active {
            color: #8b7355;
            background-color: rgba(139, 115, 85, 0.1);
        }

        .nav-menu li a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 2px;
            background-color: #8b7355;
        }

        .main-content {
            margin-top: 140px;
            padding-bottom: 60px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 0;
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border-bottom: 2px solid #c9b896;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 15px;
        }

        .page-subtitle {
            font-size: 18px;
            color: #6b5d4f;
        }

        .section {
            margin-bottom: 60px;
            padding: 40px;
            background-color: #fff;
            border: 2px solid #c9b896;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.08);
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 25px;
            text-align: center;
        }

        .family-members {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        .member-card {
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border: 2px solid #d4c4a8;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .member-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(139, 115, 85, 0.15);
        }

        .member-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b7355 0%, #a08060 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #fff;
        }

        .member-name {
            font-size: 22px;
            font-weight: 700;
            color: #5a4a3a;
            margin-bottom: 8px;
        }

        .member-relation {
            font-size: 16px;
            color: #8b7355;
            margin-bottom: 15px;
        }

        .member-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: #4caf50;
            color: #fff;
            font-size: 14px;
            border-radius: 20px;
        }

        .member-status.warning {
            background: #ff9800;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .view-detail-btn {
            margin-top: 20px;
            padding: 10px 25px;
            background: #8b7355;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', '思源宋体', serif;
        }

        .view-detail-btn:hover {
            background: #7a6248;
        }

        .health-overview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .overview-card {
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border: 1px solid #d4c4a8;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .overview-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 10px;
        }

        .overview-label {
            font-size: 14px;
            color: #6b5d4f;
            margin-bottom: 5px;
        }

        .overview-value {
            font-size: 24px;
            font-weight: 700;
            color: #8b7355;
        }

        .alert-section {
            background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .alert-title {
            font-size: 20px;
            font-weight: 700;
            color: #f57c00;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-list {
            list-style: none;
        }

        .alert-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid #ffe082;
        }

        .alert-item:last-child {
            border-bottom: none;
        }

        .alert-icon {
            width: 30px;
            height: 30px;
            background: #ff9800;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            flex-shrink: 0;
        }

        .alert-content {
            flex-grow: 1;
        }

        .alert-member {
            font-size: 16px;
            font-weight: 700;
            color: #5a4a3a;
        }

        .alert-message {
            font-size: 14px;
            color: #6b5d4f;
        }

        .alert-time {
            font-size: 12px;
            color: #8b7355;
        }

        .care-reminder {
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border: 1px solid #d4c4a8;
            border-radius: 8px;
            padding: 25px;
        }

        .reminder-title {
            font-size: 20px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 20px;
        }

        .reminder-list {
            list-style: none;
        }

        .reminder-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #d4c4a8;
        }

        .reminder-item:last-child {
            border-bottom: none;
        }

        .reminder-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #8b7355;
            border-radius: 4px;
            cursor: pointer;
        }

        .reminder-text {
            font-size: 16px;
            color: #5a4a3a;
            flex-grow: 1;
        }

        .reminder-time {
            font-size: 14px;
            color: #8b7355;
        }

        .add-member-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 20px;
            background: transparent;
            border: 2px dashed #d4c4a8;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            color: #8b7355;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', '思源宋体', serif;
        }

        .add-member-btn:hover {
            background: rgba(139, 115, 85, 0.05);
            border-color: #8b7355;
        }

        .footer {
            background: linear-gradient(135deg, #f8f6f1 0%, #f0ebe3 100%);
            border-top: 2px solid #8b7355;
            padding: 40px 20px;
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #5a4a3a;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #8b7355;
        }

        .footer-copyright {
            color: #6b5d4f;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
            }

            .family-members {
                grid-template-columns: 1fr;
            }

            .health-overview {
                grid-template-columns: repeat(2, 1fr);
            }

            .section {
                padding: 25px;
            }
        }
    </style>
</head>

    <!-- 添加成员弹窗 -->
    <div id="addMemberModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center;">
        <div style="background: #fff; border-radius: 12px; padding: 40px; max-width: 500px; width: 90%; border: 2px solid #c9b896;">
            <h3 style="font-size: 24px; color: #8b7355; margin-bottom: 30px; text-align: center;">添加家庭成员</h3>
            <form id="addMemberForm">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 16px; color: #5a4a3a; margin-bottom: 8px;">成员姓名</label>
                    <input type="text" id="memberName" required style="width: 100%; padding: 12px; border: 1px solid #d4c4a8; border-radius: 6px; font-size: 16px; font-family: inherit;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 16px; color: #5a4a3a; margin-bottom: 8px;">与您的关系</label>
                    <select id="memberRelation" required style="width: 100%; padding: 12px; border: 1px solid #d4c4a8; border-radius: 6px; font-size: 16px; font-family: inherit;">
                        <option value="">请选择关系</option>
                        <option value="father">父亲</option>
                        <option value="mother">母亲</option>
                        <option value="grandfather">祖父</option>
                        <option value="grandmother">祖母</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 16px; color: #5a4a3a; margin-bottom: 8px;">手机号（用于关联账号）</label>
                    <input type="tel" id="memberPhone" required style="width: 100%; padding: 12px; border: 1px solid #d4c4a8; border-radius: 6px; font-size: 16px; font-family: inherit;">
                </div>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button type="button" onclick="FamilyModule.closeAddModal()" style="padding: 12px 30px; background: transparent; border: 2px solid #8b7355; color: #8b7355; border-radius: 6px; font-size: 16px; cursor: pointer; font-family: inherit;">取消</button>
                    <button type="submit" style="padding: 12px 30px; background: #8b7355; border: none; color: #fff; border-radius: 6px; font-size: 16px; cursor: pointer; font-family: inherit;">添加</button>
                </div>
            </form>
        </div>

    <!-- 成员详情弹窗 -->
    <div id="memberDetailModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; overflow-y: auto;">
        <div style="background: #fff; border-radius: 12px; padding: 40px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto; border: 2px solid #c9b896; margin: 20px auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h3 style="font-size: 24px; color: #8b7355;" id="detailMemberName">成员详情</h3>
                <button onclick="FamilyModule.closeDetailModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #8b7355;">×</button>
            </div>
            <div id="memberDetailContent">
                <!-- 详情内容将通过JS动态加载 -->
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // 后端API配置
        // ============================================
        const API_BASE_URL = 'http://localhost:8080/api';

        // ============================================
        // 家庭成员管理模块
        // ============================================
        const FamilyModule = {
            // 获取家庭成员列表
            async fetchFamilyMembers() {
                try {
                    const response = await fetch(`${API_BASE_URL}/family/members`, {
                        headers: {
                            'Authorization': `Bearer ${this.getToken()}`
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        this.renderFamilyMembers(data);
                    } else {
                        // 从localStorage获取
                        this.renderFamilyMembersFromLocal();
                    }
                } catch (error) {
                    console.error('获取家庭成员失败:', error);
                    this.renderFamilyMembersFromLocal();
                }
            },

            // 从localStorage渲染家庭成员
            renderFamilyMembersFromLocal() {
                const members = JSON.parse(localStorage.getItem('familyMembers') || '[]');
                if (members.length === 0) {
                    // 显示默认数据
                    const defaultMembers = [
                        { id: 1, name: '王大爷', relation: '父亲', relationText: '父亲', avatar: '👴', status: 'healthy', statusText: '健康良好' },
                        { id: 2, name: '李奶奶', relation: 'mother', relationText: '母亲', avatar: '👵', status: 'warning', statusText: '需要关注' }
                    ];
                    this.renderFamilyMembers(defaultMembers);
                } else {
                    this.renderFamilyMembers(members);
                }
            },

            // 渲染家庭成员卡片
            renderFamilyMembers(members) {
                const container = document.getElementById('familyMembersContainer');
                if (!container) return;

                const membersHtml = members.map(member => `
                    <div class="member-card" data-member-id="${member.id}">
                        <div class="member-avatar">${member.avatar || this.getDefaultAvatar(member.relation)}</div>
                        <h3 class="member-name">${member.name}</h3>
                        <p class="member-relation">${member.relationText || member.relation}</p>
                        <span class="member-status ${member.status === 'warning' ? 'warning' : ''}">
                            <span class="status-dot"></span>
                            ${member.statusText || '健康良好'}
                        </span>
                        <button class="view-detail-btn" onclick="FamilyModule.viewMemberDetail(${member.id})">查看详情</button>
                    </div>
                `).join('');

                const addButtonHtml = `
                    <div class="member-card">
                        <button class="add-member-btn" onclick="FamilyModule.showAddModal()">
                            <svg width="30" height="30" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M50 20 L50 80" stroke="#8b7355" stroke-width="4"/>
                                <path d="M20 50 L80 50" stroke="#8b7355" stroke-width="4"/>
                            </svg>
                            添加成员
                        </button>
                    </div>
                `;

                container.innerHTML = membersHtml + addButtonHtml;
            },

            getDefaultAvatar(relation) {
                const avatars = {
                    'father': '👴',
                    'mother': '👵',
                    'grandfather': '👴',
                    'grandmother': '👵',
                    'other': '👤'
                };
                return avatars[relation] || '👤';
            },

            // 显示添加成员弹窗
            showAddModal() {
                const modal = document.getElementById('addMemberModal');
                if (modal) {
                    modal.style.display = 'flex';
                }
            },

            // 关闭添加成员弹窗
            closeAddModal() {
                const modal = document.getElementById('addMemberModal');
                if (modal) {
                    modal.style.display = 'none';
                    document.getElementById('addMemberForm')?.reset();
                }
            },

            // 添加家庭成员
            async addMember(name, relation, phone) {
                const member = {
                    id: Date.now(),
                    name: name,
                    relation: relation,
                    relationText: this.getRelationText(relation),
                    phone: phone,
                    avatar: this.getDefaultAvatar(relation),
                    status: 'healthy',
                    statusText: '健康良好',
                    createdAt: new Date().toISOString()
                };

                // 保存到localStorage
                const members = JSON.parse(localStorage.getItem('familyMembers') || '[]');
                members.push(member);
                localStorage.setItem('familyMembers', JSON.stringify(members));

                // 尝试同步到后端
                try {
                    const response = await fetch(`${API_BASE_URL}/family/members`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${this.getToken()}`
                        },
                        body: JSON.stringify(member)
                    });

                    if (response.ok) {
                        const result = await response.json();
                        // 更新成员ID为后端返回的ID
                        member.id = result.id;
                        localStorage.setItem('familyMembers', JSON.stringify(members));
                    }
                } catch (error) {
                    console.log('同步到后端失败，已保存到本地');
                }

                this.closeAddModal();
                this.renderFamilyMembersFromLocal();
            },

            getRelationText(relation) {
                const texts = {
                    'father': '父亲',
                    'mother': '母亲',
                    'grandfather': '祖父',
                    'grandmother': '祖母',
                    'other': '其他'
                };
                return texts[relation] || relation;
            },

            // 查看成员详情
            async viewMemberDetail(memberId) {
                try {
                    // 从后端获取成员详细信息（包含AI体质分析数据）
                    const response = await fetch(`${API_BASE_URL}/family/members/${memberId}/detail`, {
                        headers: {
                            'Authorization': `Bearer ${this.getToken()}`
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        this.renderMemberDetail(data);
                    } else {
                        // 从localStorage获取
                        const members = JSON.parse(localStorage.getItem('familyMembers') || '[]');
                        const member = members.find(m => m.id === memberId);
                        if (member) {
                            // 获取该成员的健康数据
                            const healthData = JSON.parse(localStorage.getItem(`healthData_${memberId}`) || '{}');
                            this.renderMemberDetail({ ...member, ...healthData });
                        }
                    }
                } catch (error) {
                    console.error('获取成员详情失败:', error);
                    // 使用默认数据
                    this.renderMemberDetail({
                        name: '家庭成员',
                        constitutionType: '平和质',
                        healthData: {
                            bloodPressure: { value: '120/80', unit: 'mmHg' },
                            bloodSugar: { value: 5.6, unit: 'mmol/L' },
                            heartRate: { value: 72, unit: '次/分' },
                            weight: { value: 65.5, unit: 'kg' }
                        }
                    });
                }
            },

            // 渲染成员详情
            renderMemberDetail(data) {
                const modal = document.getElementById('memberDetailModal');
                const content = document.getElementById('memberDetailContent');
                const nameEl = document.getElementById('detailMemberName');

                if (nameEl) nameEl.textContent = `${data.name || '家庭成员'} - 健康详情`;

                if (content) {
                    content.innerHTML = `
                        <div style="margin-bottom: 30px;">
                            <h4 style="font-size: 18px; color: #8b7355; margin-bottom: 15px;">体质类型</h4>
                            <p style="font-size: 16px; color: #5a4a3a; padding: 15px; background: #f5f1e8; border-radius: 8px;">
                                ${data.constitutionType || '未进行体质辨识'}
                            </p>
                        </div>
                        <div style="margin-bottom: 30px;">
                            <h4 style="font-size: 18px; color: #8b7355; margin-bottom: 15px;">最新健康数据</h4>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                                <div style="padding: 15px; background: #faf8f5; border-radius: 8px; border: 1px solid #d4c4a8;">
                                    <p style="color: #6b5d4f; font-size: 14px;">血压</p>
                                    <p style="color: #5a4a3a; font-size: 18px; font-weight: 700;">${data.healthData?.bloodPressure?.value || '--'} ${data.healthData?.bloodPressure?.unit || ''}</p>
                                </div>
                                <div style="padding: 15px; background: #faf8f5; border-radius: 8px; border: 1px solid #d4c4a8;">
                                    <p style="color: #6b5d4f; font-size: 14px;">血糖</p>
                                    <p style="color: #5a4a3a; font-size: 18px; font-weight: 700;">${data.healthData?.bloodSugar?.value || '--'} ${data.healthData?.bloodSugar?.unit || ''}</p>
                                </div>
                                <div style="padding: 15px; background: #faf8f5; border-radius: 8px; border: 1px solid #d4c4a8;">
                                    <p style="color: #6b5d4f; font-size: 14px;">心率</p>
                                    <p style="color: #5a4a3a; font-size: 18px; font-weight: 700;">${data.healthData?.heartRate?.value || '--'} ${data.healthData?.heartRate?.unit || ''}</p>
                                </div>
                                <div style="padding: 15px; background: #faf8f5; border-radius: 8px; border: 1px solid #d4c4a8;">
                                    <p style="color: #6b5d4f; font-size: 14px;">体重</p>
                                    <p style="color: #5a4a3a; font-size: 18px; font-weight: 700;">${data.healthData?.weight?.value || '--'} ${data.healthData?.weight?.unit || ''}</p>
                                </div>
                            </div>
                        </div>
                        <div style="margin-bottom: 30px;">
                            <h4 style="font-size: 18px; color: #8b7355; margin-bottom: 15px;">AI健康建议</h4>
                            <div style="padding: 15px; background: #f5f1e8; border-radius: 8px;">
                                <p style="color: #5a4a3a; line-height: 1.8;">${data.aiAdvice || '暂无AI健康建议，建议完成体质辨识获取个性化建议。'}</p>
                            </div>
                        </div>
                        <div>
                            <button onclick="FamilyModule.goToMemberHealth(${data.id})" style="width: 100%; padding: 15px; background: #8b7355; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-family: inherit;">
                                查看完整健康档案
                            </button>
                        </div>
                    `;
                }

                if (modal) {
                    modal.style.display = 'flex';
                }
            },

            // 关闭详情弹窗
            closeDetailModal() {
                const modal = document.getElementById('memberDetailModal');
                if (modal) {
                    modal.style.display = 'none';
                }
            },

            // 跳转到成员健康档案页面
            goToMemberHealth(memberId) {
                // 存储当前查看的成员ID
                localStorage.setItem('currentMemberId', memberId);
                window.location.href = `health.html?memberId=${memberId}`;
            },

            getToken() {
                return localStorage.getItem('token') || '';
            }
        };

        // ============================================
        // 家庭健康总览模块
        // ============================================
        const FamilyHealthOverviewModule = {
            // 获取家庭健康总览数据
            async fetchHealthOverview() {
                try {
                    const response = await fetch(`${API_BASE_URL}/family/health-overview`, {
                        headers: {
                            'Authorization': `Bearer ${this.getToken()}`
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        this.renderHealthOverview(data);
                    } else {
                        this.calculateLocalOverview();
                    }
                } catch (error) {
                    console.error('获取家庭健康总览失败:', error);
                    this.calculateLocalOverview();
                }
            },

            // 计算本地数据的总览
            calculateLocalOverview() {
                const members = JSON.parse(localStorage.getItem('familyMembers') || '[]');
                
                // 收集所有成员的健康数据
                let totalBP = { systolic: 0, diastolic: 0, count: 0 };
                let totalSugar = 0, sugarCount = 0;
                let totalHeartRate = 0, heartRateCount = 0;
                let totalWeight = 0, weightCount = 0;

                members.forEach(member => {
                    const healthData = JSON.parse(localStorage.getItem(`healthData_${member.id}`) || '{}');
                    
                    if (healthData.bloodPressure) {
                        const [sys, dia] = healthData.bloodPressure.value.split('/').map(Number);
                        totalBP.systolic += sys;
                        totalBP.diastolic += dia;
                        totalBP.count++;
                    }
                    if (healthData.bloodSugar) {
                        totalSugar += Number(healthData.bloodSugar.value);
                        sugarCount++;
                    }
                    if (healthData.heartRate) {
                        totalHeartRate += Number(healthData.heartRate.value);
                        heartRateCount++;
                    }
                    if (healthData.weight) {
                        totalWeight += Number(healthData.weight.value);
                        weightCount++;
                    }
                });

                const overview = {
                    avgBloodPressure: totalBP.count > 0 ? 
                        `${Math.round(totalBP.systolic / totalBP.count)}/${Math.round(totalBP.diastolic / totalBP.count)}` : '125/82',
                    avgBloodSugar: sugarCount > 0 ? (totalSugar / sugarCount).toFixed(1) : '5.8',
                    avgHeartRate: heartRateCount > 0 ? Math.round(totalHeartRate / heartRateCount) : 74,
                    avgWeight: weightCount > 0 ? (totalWeight / weightCount).toFixed(1) : '68.5'
                };

                this.renderHealthOverview(overview);
            },

            // 渲染健康总览
            renderHealthOverview(data) {
                const container = document.getElementById('healthOverviewContainer');
                if (!container) return;

                container.innerHTML = `
                    <div class="overview-card">
                        <svg class="overview-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="50" cy="50" r="35" stroke="#8b7355" stroke-width="2" fill="none"/>
                            <path d="M50 30 L50 50 L65 60" stroke="#8b7355" stroke-width="2" fill="none"/>
                        </svg>
                        <p class="overview-label">平均血压</p>
                        <p class="overview-value">${data.avgBloodPressure || '--'}</p>
                    </div>
                    <div class="overview-card">
                        <svg class="overview-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M30 50 Q50 30 70 50 Q50 70 30 50" stroke="#8b7355" stroke-width="2" fill="none"/>
                            <circle cx="50" cy="50" r="8" stroke="#8b7355" stroke-width="2" fill="none"/>
                        </svg>
                        <p class="overview-label">平均血糖</p>
                        <p class="overview-value">${data.avgBloodSugar || '--'}</p>
                    </div>
                    <div class="overview-card">
                        <svg class="overview-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M50 80 C50 80 20 55 20 35 C20 25 30 15 40 15 C45 15 50 20 50 25 C50 20 55 15 60 15 C70 15 80 25 80 35 C80 55 50 80 50 80" stroke="#8b7355" stroke-width="2" fill="none"/>
                        </svg>
                        <p class="overview-label">平均心率</p>
                        <p class="overview-value">${data.avgHeartRate || '--'}</p>
                    </div>
                    <div class="overview-card">
                        <svg class="overview-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M30 70 Q50 20 70 70" stroke="#8b7355" stroke-width="2" fill="none"/>
                            <path d="M35 60 L35 40" stroke="#8b7355" stroke-width="2"/>
                            <path d="M65 60 L65 40" stroke="#8b7355" stroke-width="2"/>
                        </svg>
                        <p class="overview-label">平均体重</p>
                        <p class="overview-value">${data.avgWeight || '--'}</p>
                    </div>
                `;
            },

            getToken() {
                return localStorage.getItem('token') || '';
            }
        };

        // ============================================
        // 健康提醒模块
        // ============================================
        const HealthAlertsModule = {
            // 获取健康提醒
            async fetchHealthAlerts() {
                try {
                    const response = await fetch(`${API_BASE_URL}/family/alerts`, {
                        headers: {
                            'Authorization': `Bearer ${this.getToken()}`
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        this.renderAlerts(data.alerts || []);
                        this.renderReminders(data.reminders || []);
                    } else {
                        this.renderDefaultAlerts();
                    }
                } catch (error) {
                    console.error('获取健康提醒失败:', error);
                    this.renderDefaultAlerts();
                }
            },

            // 渲染异常提醒
            renderAlerts(alerts) {
                const container = document.getElementById('alertList');
                if (!container) return;

                if (alerts.length === 0) {
                    container.innerHTML = `
                        <li class="alert-item" style="justify-content: center;">
                            <p style="color: #6b5d4f;">暂无异常提醒，家人们都很健康！</p>
                        </li>
                    `;
                    return;
                }

                container.innerHTML = alerts.map(alert => `
                    <li class="alert-item" data-alert-id="${alert.id}">
                        <div class="alert-icon">${alert.icon || '⚠️'}</div>
                        <div class="alert-content">
                            <p class="alert-member">${alert.memberName} - ${alert.title}</p>
                            <p class="alert-message">${alert.message}</p>
                        </div>
                        <span class="alert-time">${alert.time}</span>
                    </li>
                `).join('');
            },

            // 渲染关怀任务
            renderReminders(reminders) {
                const container = document.getElementById('reminderList');
                if (!container) return;

                if (reminders.length === 0) {
                    container.innerHTML = `
                        <li class="reminder-item" style="justify-content: center;">
                            <p style="color: #6b5d4f;">暂无关怀任务</p>
                        </li>
                    `;
                    return;
                }

                container.innerHTML = reminders.map(reminder => `
                    <li class="reminder-item" data-reminder-id="${reminder.id}">
                        <input type="checkbox" class="reminder-checkbox" ${reminder.completed ? 'checked' : ''} 
                            onchange="HealthAlertsModule.toggleReminder(${reminder.id}, this.checked)">
                        <span class="reminder-text" style="${reminder.completed ? 'text-decoration: line-through; opacity: 0.6;' : ''}">${reminder.text}</span>
                        <span class="reminder-time">${reminder.time}</span>
                    </li>
                `).join('');
            },

            // 渲染默认提醒
            renderDefaultAlerts() {
                const defaultAlerts = [
                    { id: 1, icon: '⚠️', memberName: '李奶奶', title: '血压偏高', message: '今日血压测量值为 145/95 mmHg，高于正常范围', time: '2小时前' },
                    { id: 2, icon: '💊', memberName: '王大爷', title: '用药提醒', message: '降压药服用时间即将到来', time: '30分钟前' }
                ];

                const defaultReminders = [
                    { id: 1, text: '给父亲打电话询问身体状况', time: '09:00', completed: false },
                    { id: 2, text: '提醒母亲按时服用降压药', time: '12:00', completed: false },
                    { id: 3, text: '查看父母今日健康数据', time: '18:00', completed: false },
                    { id: 4, text: '周末带父母去体检', time: '周六', completed: false }
                ];

                this.renderAlerts(defaultAlerts);
                this.renderReminders(defaultReminders);
            },

            // 切换任务完成状态
            async toggleReminder(reminderId, completed) {
                // 更新本地状态
                const reminders = JSON.parse(localStorage.getItem('careReminders') || '[]');
                const reminder = reminders.find(r => r.id === reminderId);
                if (reminder) {
                    reminder.completed = completed;
                    localStorage.setItem('careReminders', JSON.stringify(reminders));
                }

                // 同步到后端
                try {
                    await fetch(`${API_BASE_URL}/family/reminders/${reminderId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${this.getToken()}`
                        },
                        body: JSON.stringify({ completed })
                    });
                } catch (error) {
                    console.log('同步到后端失败');
                }

                // 刷新显示
                this.fetchHealthAlerts();
            },

            getToken() {
                return localStorage.getItem('token') || '';
            }
        };

        // ============================================
        // 页面初始化
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            const navbar = document.getElementById('navbar');
            
            // 导航栏滚动效果
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });

            // 添加成员表单提交
            const addMemberForm = document.getElementById('addMemberForm');
            if (addMemberForm) {
                addMemberForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('memberName').value;
                    const relation = document.getElementById('memberRelation').value;
                    const phone = document.getElementById('memberPhone').value;
                    FamilyModule.addMember(name, relation, phone);
                });
            }

            // 初始化页面数据
            initFamilyPage();
        });

        async function initFamilyPage() {
            // 并行加载各模块数据
            await Promise.all([
                FamilyModule.fetchFamilyMembers(),
                FamilyHealthOverviewModule.fetchHealthOverview(),
                HealthAlertsModule.fetchHealthAlerts()
            ]);
        }
    </script>
</body>
</html>
