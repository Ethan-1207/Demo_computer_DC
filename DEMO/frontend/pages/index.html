<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>草本数智 - 银发经济健康平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', '思源宋体', serif;
            background-color: #f7f5f0;
            color: #2c2c2c;
            line-height: 1.8;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #f8f6f1 0%, #f0ebe3 100%);
            border-bottom: 2px solid #8b7355;
            box-shadow: 0 2px 10px rgba(139, 115, 85, 0.1);
            transition: all 0.3s ease;
            animation: navSlideDown 1s ease-out;
        }

        .nav-wrapper.scrolled {
            height: 60px;
        }

        @keyframes navSlideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 120px;
            transition: height 0.3s ease;
        }

        .nav-wrapper.scrolled .nav-container {
            height: 60px;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            color: #8b7355;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo svg {
            width: 40px;
            height: 40px;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-menu li a {
            text-decoration: none;
            color: #5a4a3a;
            font-size: 18px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu li a:hover,
        .nav-menu li a.active {
            color: #8b7355;
            background-color: rgba(139, 115, 85, 0.1);
        }

        .nav-menu li a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 2px;
            background-color: #8b7355;
        }

        .main-content {
            margin-top: 140px;
            padding-bottom: 60px;
        }

        .section {
            margin-bottom: 60px;
            padding: 40px;
            background-color: #fff;
            border: 2px solid #c9b896;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.08);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .section-icon {
            width: 80px;
            height: 80px;
            flex-shrink: 0;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            color: #8b7355;
        }

        .section-subtitle {
            font-size: 16px;
            color: #6b5d4f;
            margin-top: 5px;
        }

        /* 实时时钟样式 */
        .realtime-clock {
            background: linear-gradient(135deg, #8b7355 0%, #a08060 100%);
            color: #fff;
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.3);
            min-width: 150px;
        }

        .clock-time {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .clock-greeting {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* 加载卡片样式 */
        .loading-card {
            text-align: center;
            padding: 40px;
        }

        .loading-card .push-card-title {
            color: #8b7355;
        }

        /* 推送卡片增强 */
        .push-card {
            position: relative;
            overflow: hidden;
        }

        .push-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #8b7355 0%, #a08060 100%);
        }

        .push-card.solar-term::before { background: linear-gradient(180deg, #4caf50 0%, #81c784 100%); }
        .push-card.ai-course::before { background: linear-gradient(180deg, #2196f3 0%, #64b5f6 100%); }
        .push-card.anti-fraud::before { background: linear-gradient(180deg, #ff9800 0%, #ffb74d 100%); }
        .push-card.health-tip::before { background: linear-gradient(180deg, #9c27b0 0%, #ba68c8 100%); }

        .push-card-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(139, 115, 85, 0.1);
            color: #8b7355;
            font-size: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .push-card-time {
            font-size: 12px;
            color: #a08060;
            margin-top: 10px;
        }

        .daily-push-cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .push-card {
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border: 1px solid #d4c4a8;
            border-radius: 6px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .push-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(139, 115, 85, 0.15);
        }

        .push-card-title {
            font-size: 20px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 12px;
        }

        .push-card-content {
            font-size: 16px;
            color: #5a4a3a;
            line-height: 1.8;
        }

        .play-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            padding: 12px 24px;
            background-color: #8b7355;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .play-button:hover {
            background-color: #7a6248;
            transform: scale(1.05);
        }

        .play-button svg {
            width: 24px;
            height: 24px;
        }

        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .knowledge-card {
            background: linear-gradient(135deg, #faf8f5 0%, #f5f1e8 100%);
            border: 1px solid #d4c4a8;
            border-radius: 6px;
            padding: 25px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .knowledge-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(139, 115, 85, 0.15);
            background: linear-gradient(135deg, #f5f1e8 0%, #ebe5d8 100%);
        }

        .knowledge-card-title {
            font-size: 22px;
            font-weight: 700;
            color: #8b7355;
            margin-bottom: 10px;
        }

        .knowledge-card-desc {
            font-size: 16px;
            color: #5a4a3a;
            line-height: 1.8;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .detail-button {
            padding: 12px 30px;
            background-color: #8b7355;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            align-self: flex-start;
        }

        .detail-button:hover {
            background-color: #7a6248;
        }

        .tools-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 20px;
        }

        .tool-button {
            width: 200px;
            height: 80px;
            border: 3px solid #8b7355;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Serif SC', '思源宋体', serif;
        }

        .tool-button.primary {
            background-color: #8b7355;
            color: #fff;
        }

        .tool-button.primary:hover {
            background-color: #7a6248;
            transform: scale(1.05);
        }

        .tool-button.secondary {
            background-color: transparent;
            color: #8b7355;
        }

        .tool-button.secondary:hover {
            background-color: rgba(139, 115, 85, 0.1);
            transform: scale(1.05);
        }

        .footer {
            background: linear-gradient(135deg, #f8f6f1 0%, #f0ebe3 100%);
            border-top: 2px solid #8b7355;
            padding: 40px 20px;
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #5a4a3a;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #8b7355;
        }

        .footer-copyright {
            color: #6b5d4f;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
            }

            .knowledge-grid {
                grid-template-columns: 1fr;
            }

            .tools-container {
                flex-direction: column;
                align-items: center;
            }

            .section {
                padding: 25px;
            }
        }
    </style>
</head>

    <script>
        // ============================================
        // 后端API配置
        // ============================================
        const API_BASE_URL = 'http://localhost:8080/api'; // 后端接口基础地址

        // ============================================
        // 实时时钟模块
        // ============================================
        const ClockModule = {
            timer: null,

            // 初始化时钟
            init() {
                this.updateClock();
                this.timer = setInterval(() => this.updateClock(), 1000);
            },

            // 更新时钟显示
            updateClock() {
                const now = new Date();
                const timeEl = document.getElementById('clockTime');
                const greetingEl = document.getElementById('clockGreeting');

                if (timeEl) {
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    const seconds = String(now.getSeconds()).padStart(2, '0');
                    timeEl.textContent = `${hours}:${minutes}:${seconds}`;
                }

                if (greetingEl) {
                    const hour = now.getHours();
                    let greeting = '您好';
                    if (hour >= 5 && hour < 12) {
                        greeting = '早上好，开启美好一天';
                    } else if (hour >= 12 && hour < 14) {
                        greeting = '中午好，记得午休';
                    } else if (hour >= 14 && hour < 18) {
                        greeting = '下午好，保持活力';
                    } else if (hour >= 18 && hour < 22) {
                        greeting = '晚上好，放松身心';
                    } else {
                        greeting = '夜深了，早点休息';
                    }
                    greetingEl.textContent = greeting;
                }
            },

            // 销毁时钟
            destroy() {
                if (this.timer) {
                    clearInterval(this.timer);
                    this.timer = null;
                }
            }
        };

        // ============================================
        // 每日推送模块 - 与后端交互
        // ============================================
        const DailyPushModule = {
            // 获取每日推送内容
            async fetchDailyPush() {
                try {
                    const response = await fetch(`${API_BASE_URL}/daily-push`, {
                        headers: {
                            'Authorization': `Bearer ${this.getToken()}`
                        }
                    });
                    if (!response.ok) throw new Error('获取每日推送失败');
                    const data = await response.json();
                    this.renderDailyPush(data);
                } catch (error) {
                    console.error('获取每日推送失败:', error);
                    // 使用默认数据
                    this.renderDefaultDailyPush();
                }
            },

            // 渲染每日推送内容
            renderDailyPush(data) {
                const container = document.getElementById('dailyPushContainer');
                if (!container || !data) return;

                // 支持后端返回数组或对象格式
                const pushItems = Array.isArray(data) ? data : [data.solarTerm, data.aiCourse, data.antiFraud, data.healthTip].filter(Boolean);

                if (pushItems.length === 0) {
                    this.renderDefaultDailyPush();
                    return;
                }

                container.innerHTML = pushItems.map((item, index) => this.createPushCard(item, index)).join('');
            },

            // 创建推送卡片HTML
            createPushCard(item, index) {
                const typeClass = item.type || 'default';
                const typeName = this.getTypeName(item.type);
                const hasAudio = item.audioUrl && item.audioUrl.trim() !== '';

                return `
                    <div class="push-card ${typeClass}" data-id="${item.id || ''}" data-type="${item.type || ''}">
                        <span class="push-card-tag">${typeName}</span>
                        <h3 class="push-card-title">${item.title || '养生提醒'}</h3>
                        <p class="push-card-content">${item.content || item.summary || ''}</p>
                        ${hasAudio ? `
                        <button class="play-button" onclick="DailyPushModule.playAudio('${item.audioUrl}', '${item.id}')">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                            <span id="playBtn-${item.id}">一键播放</span>
                        </button>
                        ` : ''}
                        ${item.aiGenerated ? '<span style="color: #2196f3; font-size: 12px;">🤖 AI生成</span>' : ''}
                        <p class="push-card-time">推送时间：${this.formatTime(item.pushTime || item.createTime)}</p>
                    </div>
                `;
            },

            // 获取类型名称
            getTypeName(type) {
                const typeMap = {
                    'solar-term': '节气养生',
                    'ai-course': 'AI养生课',
                    'anti-fraud': '防骗提示',
                    'health-tip': '健康提醒',
                    'diet': '饮食建议',
                    'exercise': '运动指导',
                    'default': '养生推送'
                };
                return typeMap[type] || typeMap['default'];
            },

            // 渲染默认数据（当后端不可用）
            renderDefaultDailyPush() {
                const now = new Date();
                const defaultData = [
                    {
                        id: 'default-1',
                        type: 'solar-term',
                        title: `${this.getCurrentSolarTerm()}养生提醒`,
                        content: `今日正值${this.getCurrentSolarTerm()}时节，阳气生发，宜早睡早起，适当运动。饮食上可多吃时令蔬菜，帮助身体适应季节变化。`,
                        pushTime: now.toISOString()
                    },
                    {
                        id: 'default-2',
                        type: 'ai-course',
                        title: 'AI每日养生课',
                        content: '今日主题：春季养肝护肝。为您带来专业养生指导，包括穴位按摩、饮食建议和运动方案。',
                        audioUrl: '',
                        aiGenerated: true,
                        pushTime: now.toISOString()
                    },
                    {
                        id: 'default-3',
                        type: 'anti-fraud',
                        title: '防骗小提示',
                        content: '警惕"包治百病"的保健品广告！正规保健品不能替代药物治疗，购买前请咨询专业医生或药师。',
                        pushTime: now.toISOString()
                    },
                    {
                        id: 'default-4',
                        type: 'health-tip',
                        title: '今日健康提醒',
                        content: '根据您的体质分析，建议您今日多喝水、适量散步，保持心情愉悦。',
                        aiGenerated: true,
                        pushTime: now.toISOString()
                    }
                ];
                this.renderDailyPush(defaultData);
            },

            // 获取当前节气
            getCurrentSolarTerm() {
                const date = new Date();
                const month = date.getMonth() + 1;
                const day = date.getDate();

                // 简化的节气判断
                const solarTerms = [
                    { name: '小寒', month: 1, day: 6 },
                    { name: '大寒', month: 1, day: 20 },
                    { name: '立春', month: 2, day: 4 },
                    { name: '雨水', month: 2, day: 19 },
                    { name: '惊蛰', month: 3, day: 6 },
                    { name: '春分', month: 3, day: 21 },
                    { name: '清明', month: 4, day: 5 },
                    { name: '谷雨', month: 4, day: 20 },
                    { name: '立夏', month: 5, day: 6 },
                    { name: '小满', month: 5, day: 21 },
                    { name: '芒种', month: 6, day: 6 },
                    { name: '夏至', month: 6, day: 21 },
                    { name: '小暑', month: 7, day: 7 },
                    { name: '大暑', month: 7, day: 23 },
                    { name: '立秋', month: 8, day: 8 },
                    { name: '处暑', month: 8, day: 23 },
                    { name: '白露', month: 9, day: 8 },
                    { name: '秋分', month: 9, day: 23 },
                    { name: '寒露', month: 10, day: 8 },
                    { name: '霜降', month: 10, day: 23 },
                    { name: '立冬', month: 11, day: 7 },
                    { name: '小雪', month: 11, day: 22 },
                    { name: '大雪', month: 12, day: 7 },
                    { name: '冬至', month: 12, day: 22 }
                ];

                for (let term of solarTerms) {
                    if (month < term.month || (month === term.month && day < term.day)) {
                        return term.name;
                    }
                }
                return '冬至';
            },

            // 播放音频
            playAudio(audioUrl, itemId) {
                if (!audioUrl) {
                    alert('音频内容即将上线，敬请期待！');
                    return;
                }

                const btnText = document.getElementById(`playBtn-${itemId}`);
                if (btnText) btnText.textContent = '播放中...';

                const audio = new Audio(audioUrl);
                audio.play()
                    .then(() => {
                        audio.onended = () => {
                            if (btnText) btnText.textContent = '一键播放';
                        };
                    })
                    .catch(err => {
                        console.error('播放失败:', err);
                        alert('音频播放失败，请稍后重试');
                        if (btnText) btnText.textContent = '一键播放';
                    });
            },

            // 格式化时间
            formatTime(timeStr) {
                if (!timeStr) return '刚刚';
                const date = new Date(timeStr);
                return `${date.getMonth() + 1}月${date.getDate()}日 ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
            },

            // 获取Token
            getToken() {
                return localStorage.getItem('token') || '';
            }
        };

        // ============================================
        // 中医养生知识库模块 - 与后端交互
        // ============================================
        const KnowledgeModule = {
            // 获取知识库分类
            async fetchKnowledgeCategories() {
                try {
                    const response = await fetch(`${API_BASE_URL}/knowledge/categories`);
                    if (!response.ok) throw new Error('获取知识库分类失败');
                    const data = await response.json();
                    this.renderKnowledgeCategories(data);
                } catch (error) {
                    console.error('获取知识库分类失败:', error);
                    this.renderDefaultCategories();
                }
            },

            // 渲染知识库分类
            renderKnowledgeCategories(categories) {
                const container = document.querySelector('.knowledge-grid');
                if (!container || !categories || categories.length === 0) {
                    this.renderDefaultCategories();
                    return;
                }

                container.innerHTML = categories.map(cat => `
                    <div class="knowledge-card" data-category="${cat.code}">
                        <h3 class="knowledge-card-title">${cat.name}</h3>
                        <p class="knowledge-card-desc">${cat.description}</p>
                        <button class="detail-button" onclick="KnowledgeModule.viewCategoryDetail('${cat.code}')">查看详情</button>
                    </div>
                `).join('');
            },

            // 渲染默认分类
            renderDefaultCategories() {
                const defaultCategories = [
                    { code: 'constitution', name: '体质养生', description: '了解9种中医体质特征，获取个性化的调理方案，包括饮食建议、运动指导和穴位按摩方法。' },
                    { code: 'chronic', name: '慢病调理', description: '高血压、糖尿病、冠心病等老年常见病的中医养生方案，帮助您科学管理健康，提高生活质量。' },
                    { code: 'solar', name: '节气养生', description: '二十四节气专属养生内容，顺应自然规律，掌握每个节气的饮食起居要点，健康度过四季。' },
                    { code: 'anti-fraud', name: '防骗科普', description: '识别养生谣言，避开虚假保健品陷阱，学习科学养生知识，守护您的健康和财产安全。' }
                ];
                this.renderKnowledgeCategories(defaultCategories);
            },

            // 查看分类详情
            async viewCategoryDetail(categoryCode) {
                try {
                    const response = await fetch(`${API_BASE_URL}/knowledge/category/${categoryCode}`);
                    if (!response.ok) throw new Error('获取分类详情失败');
                    const data = await response.json();
                    // 跳转到详情页或显示弹窗
                    window.location.href = `knowledge-detail.html?category=${categoryCode}`;
                } catch (error) {
                    console.error('获取分类详情失败:', error);
                    alert('详情页面即将上线，敬请期待！');
                }
            },

            // 获取AI推荐文章
            async fetchAIRecommendedArticles() {
                try {
                    const response = await fetch(`${API_BASE_URL}/knowledge/ai-recommendations`);
                    if (!response.ok) throw new Error('获取AI推荐失败');
                    const data = await response.json();
                    // 可以在这里更新知识库卡片的内容
                    console.log('AI推荐文章:', data);
                } catch (error) {
                    console.error('获取AI推荐失败:', error);
                }
            }
        };

        // ============================================
        // 文章管理模块 - 接收后端上传的文章
        // ============================================
        const ArticleModule = {
            // 获取最新文章列表
            async fetchLatestArticles(category, limit = 4) {
                try {
                    const response = await fetch(`${API_BASE_URL}/articles?category=${category}&limit=${limit}`);
                    if (!response.ok) throw new Error('获取文章列表失败');
                    const data = await response.json();
                    return data;
                } catch (error) {
                    console.error('获取文章列表失败:', error);
                    return [];
                }
            },

            // 获取单篇文章详情
            async fetchArticleDetail(articleId) {
                try {
                    const response = await fetch(`${API_BASE_URL}/articles/${articleId}`);
                    if (!response.ok) throw new Error('获取文章详情失败');
                    return await response.json();
                } catch (error) {
                    console.error('获取文章详情失败:', error);
                    return null;
                }
            },

            // 搜索文章
            async searchArticles(keyword) {
                try {
                    const response = await fetch(`${API_BASE_URL}/articles/search?keyword=${encodeURIComponent(keyword)}`);
                    if (!response.ok) throw new Error('搜索文章失败');
                    return await response.json();
                } catch (error) {
                    console.error('搜索文章失败:', error);
                    return [];
                }
            }
        };

        // ============================================
        // AI交互模块 - 处理AI返回的内容
        // ============================================
        const AIModule = {
            // 获取AI生成的每日养生建议
            async fetchAIDailyAdvice() {
                try {
                    const response = await fetch(`${API_BASE_URL}/ai/daily-advice`);
                    if (!response.ok) throw new Error('获取AI建议失败');
                    return await response.json();
                } catch (error) {
                    console.error('获取AI建议失败:', error);
                    return null;
                }
            },

            // 获取AI生成的体质分析报告
            async fetchAIConstitutionAnalysis(userData) {
                try {
                    const response = await fetch(`${API_BASE_URL}/ai/constitution-analysis`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });
                    if (!response.ok) throw new Error('获取AI体质分析失败');
                    return await response.json();
                } catch (error) {
                    console.error('获取AI体质分析失败:', error);
                    return null;
                }
            },

            // 获取AI谣言识别结果
            async fetchAIRumorCheck(content) {
                try {
                    const response = await fetch(`${API_BASE_URL}/ai/rumor-check`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content })
                    });
                    if (!response.ok) throw new Error('AI谣言识别失败');
                    return await response.json();
                } catch (error) {
                    console.error('AI谣言识别失败:', error);
                    return null;
                }
            }
        };

        // ============================================
        // 页面初始化
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            const navbar = document.getElementById('navbar');
            const currentDateElement = document.getElementById('currentDate');

            // 显示当前日期
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            if (currentDateElement) {
                currentDateElement.textContent = now.toLocaleDateString('zh-CN', options);
            }

            // 导航栏滚动效果
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });

            // 初始化实时时钟
            ClockModule.init();

            // 初始化数据加载
            initPageData();
        });

        // 初始化页面数据
        async function initPageData() {
            // 并行加载多个模块的数据
            await Promise.all([
                DailyPushModule.fetchDailyPush(),
                KnowledgeModule.fetchKnowledgeCategories(),
                KnowledgeModule.fetchAIRecommendedArticles()
            ]);
        }

        // 定时刷新数据（每5分钟）
        setInterval(() => {
            DailyPushModule.fetchDailyPush();
        }, 5 * 60 * 1000);

        // 页面卸载时清理定时器
        window.addEventListener('beforeunload', () => {
            ClockModule.destroy();
        });
    </script>
</body>
</html>
